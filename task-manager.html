<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>院長タスク管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #faf9f6;
    --border: #e8e4dc;
    --text: #2c2a26;
    --text-muted: #9a9590;
    --accent: #5b8a72;
    --accent-light: #e8f2ed;
    --high: #c9524a;
    --high-light: #fdeeed;
    --med: #d4883a;
    --med-light: #fef3e7;
    --low: #6a8ab0;
    --low-light: #eef2f8;
    --tag-bg: #ede9e1;
    --shadow: 0 2px 12px rgba(44,42,38,0.08);
    --shadow-lg: 0 8px 32px rgba(44,42,38,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .header-title span {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--text-muted);
    display: block;
    letter-spacing: 0.08em;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 16px;
    height: 36px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }

  .btn-add:hover { background: #4a7862; transform: translateY(-1px); }

  /* ===== FILTERS ===== */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ===== MAIN ===== */
  main { padding: 20px; max-width: 1200px; margin: 0 auto; }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    flex: 1;
    min-width: 110px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ===== BOARD VIEW ===== */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .board { grid-template-columns: 1fr; } }

  .column {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .column-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .column-title {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .col-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .col-todo .col-dot { background: var(--text-muted); }
  .col-doing .col-dot { background: var(--med); }
  .col-done .col-dot { background: var(--accent); }
  .col-hold .col-dot { background: var(--low); }

  .column-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 100px;
  }

  .column-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 100px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .task-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .task-card.pri-high::before { background: var(--high); }
  .task-card.pri-med::before { background: var(--med); }
  .task-card.pri-low::before { background: var(--low); }

  .task-card.overdue { border-color: #f5c6c4; background: #fffbfb; }

  .task-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 500;
  }

  .badge-cat {
    background: var(--tag-bg);
    color: var(--text-muted);
  }

  .badge-high { background: var(--high-light); color: var(--high); }
  .badge-med { background: var(--med-light); color: var(--med); }
  .badge-low { background: var(--low-light); color: var(--low); }

  .badge-date {
    background: var(--accent-light);
    color: var(--accent);
    margin-left: auto;
  }

  .badge-date.overdue-date { background: var(--high-light); color: var(--high); }
  .badge-date.today-date { background: var(--med-light); color: var(--med); }

  .task-tags {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  .tag {
    font-size: 10px;
    background: var(--tag-bg);
    color: var(--text-muted);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* ===== LIST VIEW ===== */
  .list-view { display: flex; flex-direction: column; gap: 6px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    padding-left: 20px;
    overflow: hidden;
  }

  .list-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .list-item.pri-high::before { background: var(--high); }
  .list-item.pri-med::before { background: var(--med); }
  .list-item.pri-low::before { background: var(--low); }
  .list-item:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

  .list-item.overdue { border-color: #f5c6c4; }

  .list-check {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }

  .list-check:hover { border-color: var(--accent); }
  .list-check.done-check { background: var(--accent); border-color: var(--accent); color: white; }

  .list-content { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 500; }
  .list-title.done-title { text-decoration: line-through; color: var(--text-muted); }
  .list-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }

  .list-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  /* ===== MODAL ===== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,42,38,0.4);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  @media (min-width: 600px) {
    .overlay { align-items: center; }
    .modal { border-radius: var(--radius) !important; max-width: 520px; }
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 20px;
    transform: translateY(40px);
    transition: transform 0.25s;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
  }

  .btn-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }

  .radio-option { display: none; }

  .radio-label {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .radio-option:checked + .radio-label {
    font-weight: 600;
  }

  #pri-high:checked + .radio-label { background: var(--high-light); border-color: var(--high); color: var(--high); }
  #pri-med:checked + .radio-label { background: var(--med-light); border-color: var(--med); color: var(--med); }
  #pri-low:checked + .radio-label { background: var(--low-light); border-color: var(--low); color: var(--low); }

  .status-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .status-option { display: none; }

  .status-label {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .status-option:checked + .status-label {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--high);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-delete:hover { background: var(--high-light); border-color: var(--high); }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 24px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
  }

  .btn-save:hover { background: #4a7862; }

  /* ===== EMPTY STATE ===== */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ===== PRINT ===== */
  @media print {
    header, .filter-bar, .stats-bar, .btn-add, .btn-icon, .overlay { display: none !important; }
    main { padding: 0; }
    .board { grid-template-columns: repeat(4, 1fr); }
    .task-card { break-inside: avoid; box-shadow: none; }
    body { background: white; }
  }

  /* ===== NOTIFICATION TOAST ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 300;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    Task Manager
    <span>カルミアデンタルクリニック 院長</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="btn-list" title="リスト表示" onclick="setView('list')">☰</button>
    <button class="btn-icon active" id="btn-board" title="ボード表示" onclick="setView('board')">⊞</button>
    <button class="btn-icon" title="印刷" onclick="window.print()">🖨</button>
    <button class="btn-add" onclick="openModal()">＋ 追加</button>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-chip" onclick="setFilter('未着手', this)">未着手</button>
  <button class="filter-chip" onclick="setFilter('進行中', this)">進行中</button>
  <button class="filter-chip" onclick="setFilter('完了', this)">完了</button>
  <button class="filter-chip" onclick="setFilter('保留', this)">保留</button>
  <button class="filter-chip" onclick="setFilter('overdue', this)">⚠ 期限切れ</button>
  <button class="filter-chip" onclick="setFilter('high', this)">🔴 高優先</button>
  <button class="filter-chip" onclick="setFilter('診療', this)">診療</button>
  <button class="filter-chip" onclick="setFilter('経営', this)">経営</button>
  <button class="filter-chip" onclick="setFilter('スタッフ', this)">スタッフ</button>
  <button class="filter-chip" onclick="setFilter('設備', this)">設備</button>
</div>

<main>
  <div class="stats-bar" id="stats-bar"></div>
  <div id="view-container"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">タスクを追加</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label>タイトル *</label>
      <input type="text" id="f-title" placeholder="タスクのタイトルを入力">
    </div>

    <div class="form-group">
      <label>メモ</label>
      <textarea id="f-note" placeholder="詳細・備考など"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="f-cat">
          <option value="診療">診療</option>
          <option value="経営">経営</option>
          <option value="スタッフ">スタッフ</option>
          <option value="設備">設備</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>期限</label>
        <input type="date" id="f-date">
      </div>
    </div>

    <div class="form-group">
      <label>優先度</label>
      <div class="radio-group">
        <input type="radio" class="radio-option" name="priority" id="pri-high" value="high">
        <label for="pri-high" class="radio-label">🔴 高</label>
        <input type="radio" class="radio-option" name="priority" id="pri-med" value="med" checked>
        <label for="pri-med" class="radio-label">🟡 中</label>
        <input type="radio" class="radio-option" name="priority" id="pri-low" value="low">
        <label for="pri-low" class="radio-label">🔵 低</label>
      </div>
    </div>

    <div class="form-group">
      <label>ステータス</label>
      <div class="status-group">
        <input type="radio" class="status-option" name="status" id="st-todo" value="未着手" checked>
        <label for="st-todo" class="status-label">未着手</label>
        <input type="radio" class="status-option" name="status" id="st-doing" value="進行中">
        <label for="st-doing" class="status-label">進行中</label>
        <input type="radio" class="status-option" name="status" id="st-done" value="完了">
        <label for="st-done" class="status-label">完了</label>
        <input type="radio" class="status-option" name="status" id="st-hold" value="保留">
        <label for="st-hold" class="status-label">保留</label>
      </div>
    </div>

    <div class="form-group">
      <label>タグ（カンマ区切り）</label>
      <input type="text" id="f-tags" placeholder="例: 要確認, 院内, 急ぎ">
    </div>

    <div class="modal-footer">
      <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteTask()">削除</button>
      <button class="btn-save" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
let tasks = JSON.parse(localStorage.getItem('kalmia-tasks') || '[]');
let currentFilter = 'all';
let currentView = 'board';
let editingId = null;

function save() {
  localStorage.setItem('kalmia-tasks', JSON.stringify(tasks));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ===== DATE HELPERS =====
function today() {
  return new Date().toISOString().split('T')[0];
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  return dateStr < today();
}

function isToday(dateStr) {
  return dateStr === today();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function daysLeft(dateStr) {
  if (!dateStr) return null;
  const diff = (new Date(dateStr + 'T00:00:00') - new Date(today() + 'T00:00:00')) / 86400000;
  return Math.round(diff);
}

// ===== FILTER =====
function getFiltered() {
  return tasks.filter(t => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'overdue') return isOverdue(t.date) && t.status !== '完了';
    if (currentFilter === 'high') return t.priority === 'high';
    if (['未着手','進行中','完了','保留'].includes(currentFilter)) return t.status === currentFilter;
    if (['診療','経営','スタッフ','設備','その他'].includes(currentFilter)) return t.category === currentFilter;
    return true;
  });
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ===== VIEW =====
function setView(v) {
  currentView = v;
  document.getElementById('btn-board').classList.toggle('active', v === 'board');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  render();
}

// ===== RENDER =====
function render() {
  renderStats();
  if (currentView === 'board') renderBoard();
  else renderList();
}

function renderStats() {
  const t = tasks;
  const overdue = t.filter(x => isOverdue(x.date) && x.status !== '完了').length;
  const doing = t.filter(x => x.status === '進行中').length;
  const done = t.filter(x => x.status === '完了').length;
  const total = t.length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">全タスク</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--med)">${doing}</div><div class="stat-label">進行中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${done}</div><div class="stat-label">完了</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--high)">${overdue}</div><div class="stat-label">期限切れ</div></div>
  `;
}

function taskCard(t) {
  const od = isOverdue(t.date) && t.status !== '完了';
  const tod = isToday(t.date) && t.status !== '完了';
  const dl = daysLeft(t.date);
  let dateLabel = '';
  if (t.date) {
    let cls = 'badge-date';
    if (od) cls += ' overdue-date';
    else if (tod) cls += ' today-date';
    const txt = od ? `⚠ ${formatDate(t.date)}` : tod ? `今日 ${formatDate(t.date)}` : dl !== null && dl <= 3 ? `あと${dl}日` : formatDate(t.date);
    dateLabel = `<span class="badge ${cls}">${txt}</span>`;
  }

  const priMap = { high:'badge-high', med:'badge-med', low:'badge-low' };
  const priLabel = { high:'高', med:'中', low:'低' };

  const tags = (t.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');

  return `
    <div class="task-card pri-${t.priority} ${od ? 'overdue' : ''}" onclick="openModal('${t.id}')">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        <span class="badge badge-cat">${t.category || 'その他'}</span>
        <span class="badge ${priMap[t.priority]}">${priLabel[t.priority]}</span>
        ${dateLabel}
      </div>
      ${tags ? `<div class="task-tags">${tags}</div>` : ''}
    </div>
  `;
}

function renderBoard() {
  const filtered = getFiltered();
  const cols = [
    { id: 'todo',  label: '未着手', status: '未着手', cls: 'col-todo' },
    { id: 'doing', label: '進行中', status: '進行中', cls: 'col-doing' },
    { id: 'done',  label: '完了',   status: '完了',   cls: 'col-done' },
    { id: 'hold',  label: '保留',   status: '保留',   cls: 'col-hold' },
  ];

  let html = '<div class="board">';
  for (const col of cols) {
    const items = filtered.filter(t => t.status === col.status);
    html += `
      <div class="column">
        <div class="column-header ${col.cls}">
          <div class="column-title">
            <span class="col-dot"></span>${col.label}
          </div>
          <span class="column-count">${items.length}</span>
        </div>
        <div class="column-body">
          ${items.length ? items.map(taskCard).join('') : '<div class="empty">タスクなし</div>'}
        </div>
      </div>
    `;
  }
  html += '</div>';
  document.getElementById('view-container').innerHTML = html;
}

function renderList() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('view-container').innerHTML = '<div class="empty" style="padding:60px">タスクがありません</div>';
    return;
  }

  const priMap = { high:'badge-high', med:'badge-med', low:'badge-low' };
  const priLabel = { high:'高優先', med:'中優先', low:'低優先' };

  const items = filtered.map(t => {
    const od = isOverdue(t.date) && t.status !== '完了';
    const done = t.status === '完了';
    const dl = daysLeft(t.date);
    let dateStr = '';
    if (t.date) {
      dateStr = od ? `⚠ ${formatDate(t.date)} 期限切れ` : isToday(t.date) ? `今日` : dl !== null && dl <= 3 ? `あと${dl}日` : formatDate(t.date) + '期限';
    }

    return `
      <div class="list-item pri-${t.priority} ${od ? 'overdue' : ''}" onclick="openModal('${t.id}')">
        <div class="list-check ${done ? 'done-check' : ''}" onclick="toggleDone(event, '${t.id}')">
          ${done ? '✓' : ''}
        </div>
        <div class="list-content">
          <div class="list-title ${done ? 'done-title' : ''}">${escHtml(t.title)}</div>
          <div class="list-sub">
            <span>${t.category || 'その他'}</span>
            <span>${t.status}</span>
            ${dateStr ? `<span>${dateStr}</span>` : ''}
          </div>
        </div>
        <div class="list-right">
          <span class="badge ${priMap[t.priority]}">${priLabel[t.priority]}</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('view-container').innerHTML = `<div class="list-view">${items}</div>`;
}

function toggleDone(e, id) {
  e.stopPropagation();
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === '完了' ? '未着手' : '完了';
  save();
  render();
}

// ===== MODAL =====
function openModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('overlay');

  if (id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById('modal-title').textContent = 'タスクを編集';
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-note').value = t.note || '';
    document.getElementById('f-cat').value = t.category || '診療';
    document.getElementById('f-date').value = t.date || '';
    document.getElementById('f-tags').value = (t.tags || []).join(', ');
    document.querySelector(`input[name="priority"][value="${t.priority}"]`).checked = true;
    document.querySelector(`input[name="status"][value="${t.status}"]`).checked = true;
    document.getElementById('btn-delete').style.display = '';
  } else {
    document.getElementById('modal-title').textContent = 'タスクを追加';
    document.getElementById('f-title').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-cat').value = '診療';
    document.getElementById('f-date').value = '';
    document.getElementById('f-tags').value = '';
    document.querySelector('#pri-med').checked = true;
    document.querySelector('#st-todo').checked = true;
    document.getElementById('btn-delete').style.display = 'none';
  }

  overlay.classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }

  const data = {
    title,
    note: document.getElementById('f-note').value.trim(),
    category: document.getElementById('f-cat').value,
    date: document.getElementById('f-date').value,
    priority: document.querySelector('input[name="priority"]:checked').value,
    status: document.querySelector('input[name="status"]:checked').value,
    tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
  };

  if (editingId) {
    const idx = tasks.findIndex(x => x.id === editingId);
    tasks[idx] = { ...tasks[idx], ...data };
    showToast('タスクを更新しました');
  } else {
    tasks.unshift({ id: genId(), createdAt: new Date().toISOString(), ...data });
    showToast('タスクを追加しました');
  }

  save();
  closeModal();
  render();
}

function deleteTask() {
  if (!editingId) return;
  if (!confirm('このタスクを削除しますか？')) return;
  tasks = tasks.filter(x => x.id !== editingId);
  save();
  closeModal();
  render();
  showToast('タスクを削除しました');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== NOTIFICATIONS =====
function checkReminders() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission();
    return;
  }
  if (Notification.permission !== 'granted') return;

  const todayStr = today();
  const tomorrow = new Date(todayStr + 'T00:00:00');
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().split('T')[0];

  tasks.forEach(t => {
    if (t.status === '完了') return;
    if (t.date === todayStr) {
      new Notification('📅 本日期限のタスク', { body: t.title });
    } else if (t.date === tomorrowStr) {
      new Notification('⏰ 明日期限のタスク', { body: t.title });
    }
  });
}

// ===== UTILS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
render();
setTimeout(checkReminders, 1000);

// キーボードショートカット
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('overlay').classList.contains('open')) saveTask();
  }
});
</script>
</body>
</html>
