<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルミアデンタル スキルチェック</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#4ecdc4; --sky:#74b9ff; --coral:#ff6b6b; --yellow:#ffd93d;
  --lavender:#a29bfe; --pink:#fd79a8; --green:#55efc4;
  --bg:#f0f8ff; --white:#fff; --dark:#2d3436; --gray:#636e72; --light:#dfe6e9;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* ── HEADER ── */
header{background:var(--white);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.h-logo{display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px}
.h-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--mint),var(--sky));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.h-back{background:var(--light);border:none;border-radius:10px;padding:6px 12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;color:var(--gray);text-decoration:none}

/* ── STAFF SELECTOR ── */
#staffSelect{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:24px}
.sel-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;margin-bottom:24px;text-align:center}
.role-section{width:100%;max-width:400px;margin-bottom:20px}
.role-label-head{font-size:12px;font-weight:700;color:var(--gray);letter-spacing:.08em;margin-bottom:8px}
.staff-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.staff-btn{background:var(--white);border:2px solid var(--light);border-radius:16px;padding:14px 12px;cursor:pointer;text-align:left;transition:transform .15s,border-color .15s;display:flex;align-items:center;gap:10px}
.staff-btn:hover{transform:translateY(-2px);border-color:var(--mint)}
.staff-btn .s-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:white;flex-shrink:0}
.staff-btn.dr .s-avatar{background:linear-gradient(135deg,var(--mint),var(--sky))}
.staff-btn.dh .s-avatar{background:linear-gradient(135deg,var(--lavender),var(--pink))}
.staff-btn.da .s-avatar{background:linear-gradient(135deg,var(--yellow),var(--coral))}
.staff-btn .s-info .s-name{font-weight:700;font-size:14px}
.staff-btn .s-info .s-role{font-size:11px;color:var(--gray)}

/* ── SKILL SHEET ── */
#skillSheet{display:none;padding:16px 16px 100px;max-width:540px;margin:0 auto}
.sheet-header{background:var(--white);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sheet-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:white;flex-shrink:0}
.sheet-avatar.dr{background:linear-gradient(135deg,var(--mint),var(--sky))}
.sheet-avatar.dh{background:linear-gradient(135deg,var(--lavender),var(--pink))}
.sheet-avatar.da{background:linear-gradient(135deg,var(--yellow),var(--coral))}
.sheet-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px}
.sheet-role{font-size:12px;color:var(--gray)}
.sheet-progress{margin-left:auto;text-align:right}
.progress-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:var(--mint)}
.progress-bar-wrap{width:80px;height:6px;background:var(--light);border-radius:3px;margin-top:4px}
.progress-bar{height:6px;background:linear-gradient(90deg,var(--mint),var(--sky));border-radius:3px;transition:width .4s}

.cat-block{margin-bottom:16px}
.cat-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--gray);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.skill-card{background:var(--white);border-radius:16px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.skill-name{font-weight:700;font-size:14px;margin-bottom:10px}
.stars-row{display:flex;gap:6px;flex-wrap:wrap}

/* 星評価（DH・DA受付） */
.star-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--light);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.star-btn.active{border-color:var(--yellow);background:var(--yellow);color:white}
.star-btn.active-3{border-color:#4ecdc4;background:#4ecdc4}

/* ランク評価（DA助手・DR）*/
.rank-btn{flex:1;min-width:80px;padding:8px 6px;border-radius:12px;border:2px solid var(--light);background:var(--white);font-size:11px;font-weight:700;cursor:pointer;text-align:center;line-height:1.3;transition:all .15s}
.rank-btn.r1.active{border-color:#74b9ff;background:#74b9ff;color:white}
.rank-btn.r2.active{border-color:#4ecdc4;background:#4ecdc4;color:white}
.rank-btn.r3.active{border-color:#a29bfe;background:#a29bfe;color:white}
.rank-btn.r4.active{border-color:#ffd93d;background:#ffd93d;color:#2d3436}
.rank-btn.r5.active{border-color:#fd79a8;background:#fd79a8;color:white}
.rank-btn.r6.active{border-color:#ff6b6b;background:#ff6b6b;color:white}

/* 保存ボタン */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);padding:12px 16px;border-top:1px solid var(--light);display:none;gap:10px}
.save-bar.visible{display:flex}
.btn-save{flex:1;padding:14px;background:linear-gradient(135deg,var(--mint),var(--sky));color:white;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;cursor:pointer}
.btn-reset{padding:14px 18px;background:var(--light);color:var(--gray);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer}
.save-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none}

/* ── 評価基準 ── */
.skill-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.skill-name{font-weight:700;font-size:14px;margin-bottom:0}
.criteria-toggle{width:24px;height:24px;border-radius:50%;background:var(--lavender);color:white;border:none;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0;transition:transform .15s}
.criteria-toggle:hover{transform:scale(1.15)}
.criteria-box{background:#f8f7ff;border-radius:12px;padding:10px 12px;margin-bottom:10px;border-left:3px solid var(--lavender)}
.criteria-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(162,155,254,.15);align-items:flex-start}
.criteria-row:last-child{border-bottom:none;padding-bottom:0}
.criteria-bullet{font-size:14px;color:var(--lavender);flex-shrink:0;margin-top:1px;line-height:1.5}
.criteria-detail{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(162,155,254,.2);}
.criteria-text{font-size:12px;line-height:1.5;color:var(--dark)}
.rank-color-1{background:#e8f4fd;color:#1a73c1}
.rank-color-2{background:#e8fdf8;color:#0f7a5a}
.rank-color-3{background:#f3f0ff;color:#5f49c7}
.rank-color-4{background:#fff8e0;color:#856404}
.rank-color-5{background:#fff0f8;color:#c2185b}
.rank-color-6{background:#ffeaea;color:#c62828}

/* admin only badge */
.admin-only{display:none}
body.is-admin .admin-only{display:block}
</style>
</head>

    categories: {"模型練習": ["模型練習"], "小児歯科": ["口腔内診査", "シーラント", "CR(乳歯)", "トレーニング", "乳歯抜歯", "乳歯RCT"], "C処置": ["麻酔", "診断", "除去", "単治"], "メタルインレー": ["KP印象", "SET"], "CADインレー": ["KP印象", "SET"], "根管治療": ["抜髄", "感染根管処置", "レジンコア"], "メタルクラウン": ["PZ印象", "SET"], "ブリッジ": ["形成"], "CADクラウン": ["KP印象", "PZ印象"], "義歯": ["設計　印象", "BT", "TF", "SET", "調整", "リベース", "増歯"], "外科処置": ["永久歯普通抜歯", "埋伏抜歯", "sp", "抜糸", "電気メス"]}
  },
  DH: {
    maxRank: 4,
    rankLabels: ['教わった','やってみた','1人でできる','教えられる'],
    cumulative: true,
    categories: {
      '歯周基本治療':  ['SC'],
      'メンテ':        ['成人メンテ','P検（4～6点法）','TBI','小児','GBT'],
      'カウンセリング':['資料取り','カウンセリング'],
      'レントゲン':    ['パノラマ','デンタル（大人）','デンタル（小人）','CT'],
      '口腔内写真':    ['口腔内写真'],
      '印象':          ['対合','本印象','個人トレー','スキャナー'],
      'マウスピース':  ['作製','SET'],
      '審美':          ['ホワイトニング'],
      '補綴':          ['印象','自費歯冠修復','保険歯冠修復','TEC','仮封（TEC）除去','セメント類練和','仮封（TEC）'],
      'Hys処置':       ['Hys処置'],
      '義歯':          ['印象','印象（アシスト）'],
      'インプラント':  ['1次手術','骨増生（サイナス・GBR）','2次手術','印象','セット'],
      '歯科恐怖症':    ['IVS'],
    }
  },
  DA受付: {
    maxRank: 4,
    rankLabels: ['教わった','やってみた','1人でできる','教えられる'],
    cumulative: true,
    categories: {
      '会計':        ['会計'],
      '窓口日計表':  ['窓口日計表'],
      'アポ取り':    ['アポ取り'],
      '物販':        ['物販'],
      '在庫管理':    ['在庫管理'],
      '電話対応':    ['電話対応'],
      'クレーム対応':['クレーム対応'],
      'LINE対応':    ['LINE対応'],
      '月締め作業 （その他）':['月締め作業 （その他）'],
    }
  },
  DA助手: {
    maxRank: 5,
    rankLabels: ['説明受けた','見学した','先輩と一緒','1人でできる','先読みして用意できる'],
    cumulative: true,
    categories: {
      '根管治療':    ['RCT','RCF（側方加圧）','RCF（垂直加圧）','ファイバーコア築造'],
      'TEC':         ['形成印象','TEC修正','TECセット'],
      '義歯':        ['印象','BT','TF','セット','調整','修理'],
      '歯冠修復':    ['Zr・CAD形成印象','Zr・CADセット','メタル形成印象','メタルセット','CR','単治'],
      'マウスピース':['マウスピース印象','マウスピースセット'],
      '外科':        ['EXT(乳歯）','EXT(永久歯）','EXT(埋伏歯）','SP','抜糸'],
      'インプラント':['１次手術','２次手術','印象','セット'],
      '再生治療':    ['GBR・GTR','サイナスグラフト'],
      'MTM':         ['MTM'],
      'IVS':         ['IVS'],
    }
  },
  カウンセリング: {
    maxRank: 4,
    rankLabels: ['教わった','やってみた','1人でできる','教えられる'],
    cumulative: true,
    categories: {"初診カウンセリング": ["診療フローの説明", "カウンセリング"], "セカンド カウンセリング": ["資料作り", "Drとの打ち合わせ", "ファイル説明", "カウンセリングのゴールに向けての記入", "シナリオ作り", "カウンセリング"], "アフターカウンセリング": ["患者様に治療前後の写真を見てもらう", "アンケートをとる", "今後の予約の確認"], "補綴カウンセリング": ["シナリオ作成", "Drとの打ち合わせ", "計画書のチェック", "カウンセリング"], "教育": ["新人TCの教育"], "その他": ["スキルアップに自発的に取組む"]}
  }

// ロール別シート対応
const ROLE_SHEETS = {
  DR:    ['DR', 'カウンセリング'],
  DH:    ['DH', 'DA助手', 'カウンセリング'],
  DA受付: ['DA受付', 'DA助手', 'カウンセリング'],
  DA助手: ['DA受付', 'DA助手', 'カウンセリング'],
};

// ─── 状態 ───────────────────────────────────────────
let currentStaffId = '';
let currentRoleKey = '';
let currentData    = {}; // { skillKey: rank }
let _canEdit       = true;

// ─── 評価基準の展開/折りたたみ ──────────────────────────
window.toggleCriteria = function(btn) {
  const box = btn.closest('.skill-card').querySelector('.criteria-box');
  if (!box) return;
  const isOpen = box.style.display !== 'none';
  box.style.display = isOpen ? 'none' : 'block';
  btn.style.background = isOpen ? 'var(--lavender)' : 'var(--mint)';
};

// ─── URLパラメータからポータルユーザー判定 ───────────
const params = new URLSearchParams(location.search);
if (params.get('admin') === '1') {
  document.body.classList.add('is-admin');
  history.replaceState({}, '', location.pathname);
}

// ポータルから sid・name・role が渡された場合は自動でシートを開く
let portalUser = null; // { sid, name, role, isAdmin }

(async function checkPortalSkillParams() {
  const sid     = params.get('sid');
  const name    = params.get('name');
  const role    = params.get('role');
  const isAdmin = params.get('isAdmin') === '1';
  if (!sid || !name || !role) return;
  history.replaceState({}, '', location.pathname);

  portalUser = { sid, name, role, isAdmin };

  if (isAdmin) {
    // 管理者：スタッフ選択画面を表示
    document.getElementById('staffSelect').style.display = 'flex';
    // 管理者バッジを表示
    const badge = document.createElement('div');
    badge.style.cssText = 'background:linear-gradient(135deg,#ffd93d,#ff6b6b);color:white;font-family:Nunito,sans-serif;font-weight:800;font-size:13px;padding:6px 16px;border-radius:20px;margin-bottom:16px;text-align:center;';
    badge.textContent = `⚙️ 管理者モード（${name}）`;
    document.getElementById('staffSelect').insertBefore(badge, document.querySelector('.sel-title'));
  } else {
    // 一般スタッフ：自分のシートを直接開く
    const avatarMap = { DR:'dr', DH:'dh', 'DA受付':'da', 'DA助手':'da' };
    await openSheet(sid, name, role, avatarMap[role] || 'dh');
  }
})();

// ─── スキルシートを開く ──────────────────────────────
window.openSheet = async function(staffId, name, roleKey, avatarClass) {
  currentStaffId = staffId;
  currentRoleKey = roleKey;

  // Firebase から既存データを読む
  const snap = await get(ref(_db, `skills/${staffId}`));
  currentData = snap.exists() ? snap.val() : {};

  // ヘッダー
  const av = document.getElementById('sheetAvatar');
  av.textContent = name[0] === '院' ? '院' : name[0];
  av.className = `sheet-avatar ${avatarClass}`;
  document.getElementById('sheetName').textContent = name;
  document.getElementById('sheetRole').textContent = roleKey;

  // 保存バー：自分のシートか管理者なら表示
  const isSelf = !portalUser || portalUser.sid === staffId;
  const canEdit = isSelf || portalUser?.isAdmin;
  _canEdit = canEdit;

  // スキル項目を描画（複数シート）
  renderSkills();
  // 読み取り専用時はオーバーレイで操作不可を示す
  document.getElementById('skillSheet').style.opacity = canEdit ? '1' : '0.85';

  document.getElementById('staffSelect').style.display = 'none';
  document.getElementById('skillSheet').style.display  = 'block';
  // 保存バー表示制御
  if (canEdit) {
    document.getElementById('saveBar').classList.add('visible');
  } else {
    document.getElementById('saveBar').classList.remove('visible');
  }
  // リセットボタンは管理者のみ
  document.getElementById('resetBtn').style.display = portalUser?.isAdmin ? 'inline-block' : 'none';
  updateProgress();
};

function renderSkills() {
  const body = document.getElementById('skillBody');
  body.innerHTML = '';
  const sheets = ROLE_SHEETS[currentRoleKey] || [currentRoleKey];

  for (const sheetKey of sheets) {
    const def = SKILLS[sheetKey];
    if (!def) continue;

    // シートヘッダー（複数シートの場合のみ表示）
    if (sheets.length > 1) {
      const sheetHead = document.createElement('div');
      sheetHead.style.cssText = 'font-family:Nunito,sans-serif;font-weight:900;font-size:16px;margin:16px 0 8px;padding:8px 12px;background:linear-gradient(135deg,var(--mint),var(--sky));color:white;border-radius:12px;';
      sheetHead.textContent = sheetKey === 'カウンセリング' ? '📣 カウンセリング' :
        sheetKey === 'DR' ? '🦷 歯科医師' :
        sheetKey === 'DH' ? '🪥 衛生士業務' :
        sheetKey === 'DA受付' ? '💼 受付業務' :
        sheetKey === 'DA助手' ? '🔧 アシスト業務' : sheetKey;
      body.appendChild(sheetHead);
    }

    for (const [cat, items] of Object.entries(def.categories)) {
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.innerHTML = `<div class="cat-title">📂 ${cat}</div>`;

    for (const item of items) {
      const key  = `${cat}__${item}`;
      const card = document.createElement('div');
      card.className = 'skill-card';
      // 評価基準を取得（カテゴリ名が完全一致しないケースも考慮）
      // 完全一致 → カテゴリ部分一致 → アイテム部分一致 の順で検索
      const criteriaDict = CRITERIA[currentRoleKey] || {};
      const criteriaKey = criteriaDict[key] ? key
        : Object.keys(criteriaDict).find(k => {
            const [kCat, kItem] = k.split('__');
            const [dCat, dItem] = key.split('__');
            return (kCat.replace(/\s/g,'') === dCat.replace(/\s/g,'') &&
                    kItem.replace(/\s/g,'') === dItem.replace(/\s/g,''));
          });
      // DA助手シートは評価ポイント非表示
      const criteriaList = (sheetKey === 'DA助手') ? null
        : criteriaKey ? CRITERIA[currentRoleKey][criteriaKey] : null;

      card.innerHTML = `
        <div class="skill-name-row" style="margin-bottom:10px">
          <div class="skill-name">${item}</div>
          
        </div>
        ${criteriaList ? `
        <div class="criteria-box">
          ${Array.isArray(criteriaList)
            ? criteriaList.map(c => `<div class="criteria-row"><span class="criteria-bullet">・</span><span class="criteria-text">${c}</span></div>`).join('')
            : `${criteriaList.detail ? `<div class="criteria-detail">${criteriaList.detail}</div>` : ''}
               ${(criteriaList.points||[]).map(c => `<div class="criteria-row"><span class="criteria-bullet">・</span><span class="criteria-text">${c}</span></div>`).join('')}`
          }
        </div>` : ''}
      `;

      const row = document.createElement('div');
      row.className = 'stars-row';

      for (let r = 1; r <= def.maxRank; r++) {
        const btn = document.createElement('button');
        const cur = currentData[key] || 0;

        if (def.maxRank <= 3 || def.cumulative) {
          // 累積選択ボタン（星方式）
          const isActive = cur >= r;
          btn.className = `rank-btn r${Math.min(r,6)}${isActive ? ' active' : ''}`;
          btn.textContent = def.rankLabels[r-1];
          btn.onclick = () => toggleStar(key, r, def.maxRank);
        } else {
          // 単一選択ボタン
          btn.className = `rank-btn r${r}${cur === r ? ' active' : ''}`;
          btn.textContent = def.rankLabels[r-1];
          btn.onclick = () => toggleRank(key, r);
        }
        btn.dataset.key  = key;
        btn.dataset.rank = r;
        row.appendChild(btn);
      }
      card.appendChild(row);
      block.appendChild(card);
    }
    body.appendChild(block);
  }
  } // end sheets loop
}

function toggleStar(key, rank, max) {
  if (!_canEdit) return;
  const cur = currentData[key] || 0;
  currentData[key] = cur === rank ? rank - 1 : rank;
  refreshButtons(key, max);
  updateProgress();
}

function toggleRank(key, rank) {
  if (!_canEdit) return;
  const cur = currentData[key] || 0;
  currentData[key] = cur === rank ? 0 : rank;
  refreshRankButtons(key);
  updateProgress();
}

function refreshButtons(key, max) {
  const val = currentData[key] || 0;
  document.querySelectorAll(`[data-key="${CSS.escape(key)}"]`).forEach(btn => {
    const r = parseInt(btn.dataset.rank);
    const isActive = val >= r;
    // rank-btn方式かstar-btn方式か判定
    if (btn.className.includes('rank-btn')) {
      btn.className = `rank-btn r${Math.min(r,6)}${isActive ? ' active' : ''}`;
    } else {
      btn.className = `star-btn${isActive ? (r === 3 ? ' active active-3' : ' active') : ''}`;
    }
  });
}

function refreshRankButtons(key) {
  const val = currentData[key] || 0;
  document.querySelectorAll(`[data-key="${CSS.escape(key)}"]`).forEach(btn => {
    const r = parseInt(btn.dataset.rank);
    btn.className = `rank-btn r${r}${val === r ? ' active' : ''}`;
  });
}

function updateProgress() {
  const sheets = ROLE_SHEETS[currentRoleKey] || [currentRoleKey];
  let totalScore = 0, totalMax = 0;
  for (const sheetKey of sheets) {
    const def = SKILLS[sheetKey];
    if (!def) continue;
    for (const items of Object.values(def.categories)) {
      for (const item of items) {
        const cats = Object.keys(def.categories);
        const cat  = cats.find(c => def.categories[c].includes(item));
        const key  = `${cat}__${item}`;
        totalScore += (currentData[key] || 0);
        totalMax   += def.maxRank;
      }
    }
  }
  const pct = totalMax ? Math.round(totalScore / totalMax * 100) : 0;
  document.getElementById('progressNum').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = `${pct}%`;
}

window.saveSheet = async function() {
  await set(ref(_db, `skills/${currentStaffId}`), currentData);
  const msg = document.getElementById('saveMsg');
  msg.style.opacity = '1';
  setTimeout(() => msg.style.opacity = '0', 2000);
};

window.resetSheet = function() {
  if (!confirm('このスタッフのスキルデータをリセットしますか？')) return;
  currentData = {};
  renderSkills();
  updateProgress();
};

// ─── 戻るボタン ──────────────────────────────────────
document.querySelector('.h-back').addEventListener('click', e => {
  if (document.getElementById('skillSheet').style.display !== 'none') {
    e.preventDefault();
    document.getElementById('skillSheet').style.display = 'none';
    document.getElementById('saveBar').classList.remove('visible');
    if (portalUser?.isAdmin) {
      // 管理者：スタッフ選択画面へ
      document.getElementById('staffSelect').style.display = 'flex';
    } else {
      // 一般：ポータルへ戻る
      window.location.href = 'https://kalmia-dc.github.io/portal/';
    }
  } else {
    // 選択画面からポータルへ
    window.location.href = 'https://kalmia-dc.github.io/portal/';
  }
});
</script>
