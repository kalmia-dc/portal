<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク管理 | カルミアデンタル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #faf9f6;
    --border: #e8e4dc;
    --text: #2c2a26;
    --text-muted: #9a9590;
    --accent: #5b8a72;
    --accent-light: #e8f2ed;
    --high: #c9524a;
    --high-light: #fdeeed;
    --med: #d4883a;
    --med-light: #fef3e7;
    --low: #6a8ab0;
    --low-light: #eef2f8;
    --tag-bg: #ede9e1;
    --shadow: 0 2px 12px rgba(44,42,38,0.08);
    --radius: 14px;
    --radius-sm: 8px;
    --mint: #4ecdc4;
    --sky: #74b9ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    gap: 10px;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--accent);
    white-space: nowrap;
  }

  .header-title span {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: var(--text-muted);
    display: block;
    letter-spacing: 0.06em;
  }

  .header-center {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  .user-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 100px;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 14px;
    height: 34px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { background: #4a7862; }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ===== MAIN ===== */
  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ===== STATS ===== */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
  }

  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ===== BOARD ===== */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .board { grid-template-columns: 1fr; } }

  .column {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .column-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .column-title {
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .col-dot { width: 7px; height: 7px; border-radius: 50%; }
  .col-todo .col-dot { background: var(--text-muted); }
  .col-doing .col-dot { background: var(--med); }
  .col-done .col-dot { background: var(--accent); }
  .col-hold .col-dot { background: var(--low); }

  .column-count {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 100px;
  }

  .column-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-height: 80px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .task-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .task-card.pri-high::before { background: var(--high); }
  .task-card.pri-med::before { background: var(--med); }
  .task-card.pri-low::before { background: var(--low); }
  .task-card.overdue { border-color: #f5c6c4; }

  .task-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 7px;
  }

  .task-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 100px;
    font-weight: 500;
  }

  .badge-cat { background: var(--tag-bg); color: var(--text-muted); }
  .badge-high { background: var(--high-light); color: var(--high); }
  .badge-med { background: var(--med-light); color: var(--med); }
  .badge-low { background: var(--low-light); color: var(--low); }
  .badge-date { background: var(--accent-light); color: var(--accent); margin-left: auto; }
  .badge-date.overdue-date { background: var(--high-light); color: var(--high); }
  .badge-date.today-date { background: var(--med-light); color: var(--med); }

  .task-assignees {
    margin-top: 7px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  .assignee-chip {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
  }

  .chip-dr { background: #e8f9f8; color: #2b7a75; }
  .chip-dh { background: #f3f0ff; color: #5f49c7; }
  .chip-da { background: #fff3e8; color: #b35c00; }
  .chip-other { background: var(--tag-bg); color: var(--text-muted); }

  .task-tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }
  .tag { font-size: 10px; background: var(--tag-bg); color: var(--text-muted); padding: 1px 5px; border-radius: 4px; }

  /* ===== LIST VIEW ===== */
  .list-view { display: flex; flex-direction: column; gap: 5px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    padding-left: 18px;
    overflow: hidden;
  }

  .list-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .list-item.pri-high::before { background: var(--high); }
  .list-item.pri-med::before { background: var(--med); }
  .list-item.pri-low::before { background: var(--low); }
  .list-item:hover { box-shadow: var(--shadow); }
  .list-item.overdue { border-color: #f5c6c4; }

  .list-content { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 500; }
  .list-title.done-title { text-decoration: line-through; color: var(--text-muted); }
  .list-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .list-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  /* ===== MODAL ===== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,42,38,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  @media (min-width: 600px) {
    .overlay { align-items: center; }
    .modal { border-radius: var(--radius) !important; max-width: 540px; }
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 22px 18px;
    transform: translateY(40px);
    transition: transform 0.25s;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .modal-title { font-size: 15px; font-weight: 700; }

  .btn-close {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
  }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }

  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 11px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Priority radio */
  .radio-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .radio-option { display: none; }
  .radio-label {
    padding: 6px 13px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  #pri-high:checked + .radio-label { background: var(--high-light); border-color: var(--high); color: var(--high); font-weight: 700; }
  #pri-med:checked + .radio-label { background: var(--med-light); border-color: var(--med); color: var(--med); font-weight: 700; }
  #pri-low:checked + .radio-label { background: var(--low-light); border-color: var(--low); color: var(--low); font-weight: 700; }

  /* Status radio */
  .status-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-option { display: none; }
  .status-label {
    padding: 6px 13px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .status-option:checked + .status-label {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }

  /* Assignee checkboxes */
  .assignee-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .assignee-checkbox { display: none; }

  .assignee-label {
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .assignee-checkbox:checked + .assignee-label {
    font-weight: 700;
  }

  .role-dr .assignee-checkbox:checked + .assignee-label { background: #e8f9f8; border-color: #2b7a75; color: #2b7a75; }
  .role-dh .assignee-checkbox:checked + .assignee-label { background: #f3f0ff; border-color: #5f49c7; color: #5f49c7; }
  .role-da .assignee-checkbox:checked + .assignee-label { background: #fff3e8; border-color: #b35c00; color: #b35c00; }

  .assignee-role-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .assignee-role-group { margin-bottom: 8px; }

  .modal-footer {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--high);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-delete:hover { background: var(--high-light); border-color: var(--high); }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
  }

  .btn-save:hover { background: #4a7862; }
  .btn-save:disabled { background: var(--text-muted); cursor: not-allowed; }

  .empty { text-align: center; padding: 28px 12px; color: var(--text-muted); font-size: 12px; }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-muted);
    font-size: 13px;
    gap: 10px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 300;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== LOGIN OVERLAY ===== */
  #loginOverlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#667eea,#764ba2,#f64f59,#f7971e);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    padding: 20px;
  }

  .login-card {
    background: white;
    border-radius: 20px;
    padding: 28px 22px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }

  .login-icon { font-size: 40px; margin-bottom: 8px; }
  .login-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .login-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 20px; }

  .login-card select, .login-card input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    -webkit-appearance: none;
    background: white;
    transition: border-color 0.2s;
  }

  .login-card select:focus, .login-card input:focus { border-color: var(--mint); }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .login-btn:hover { transform: translateY(-2px); }
  .login-error { color: var(--high); font-size: 12px; margin-top: 8px; min-height: 16px; }

  @media print {
    header, .filter-bar, .stats-bar, .btn-add, .btn-icon, .overlay, #loginOverlay { display: none !important; }
    .board { grid-template-columns: repeat(4,1fr); }
    .task-card { break-inside: avoid; }
    body { background: white; }
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="login-icon">📋</div>
    <div class="login-title">タスク管理</div>
    <div class="login-sub">カルミアデンタルクリニック</div>
    <select id="loginStaff">
      <option value="">── スタッフを選択 ──</option>
      <optgroup label="DR（歯科医師）">
        <option value="院長|DR|sugihira">院長</option>
        <option value="嶋中|DR|shimanaka">嶋中</option>
        <option value="保刈|DR|hokari">保刈</option>
        <option value="篠田|DR|shinoda">篠田</option>
      </optgroup>
      <optgroup label="DH（歯科衛生士）">
        <option value="鶴田|DH|tsuruta">鶴田</option>
        <option value="吉田|DH|yoshida">吉田</option>
        <option value="高木|DH|takagi">高木</option>
        <option value="松本|DH|matsumoto">松本</option>
        <option value="野崎|DH|nozaki">野崎</option>
        <option value="山田|DH|yamada">山田</option>
        <option value="ハノワ|DH|hanowa">ハノワ</option>
      </optgroup>
      <optgroup label="DA（受付・歯科助手）">
        <option value="田宮|DA|tamiya">田宮</option>
        <option value="田中|DA|tanaka">田中</option>
        <option value="百々|DA|momo">百々</option>
      </optgroup>
    </select>
    <input type="password" id="loginPass" inputmode="numeric" maxlength="4" placeholder="パスワード（数字4桁）">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-title">
    Tasks
    <span>カルミアデンタル</span>
  </div>
  <div class="header-center">
    <div class="user-badge" id="userBadge"></div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="btn-list" title="リスト" onclick="setView('list')">☰</button>
    <button class="btn-icon active" id="btn-board" title="ボード" onclick="setView('board')">⊞</button>
    <button class="btn-icon" title="印刷" onclick="window.print()">🖨</button>
    <button class="btn-add" onclick="openModal()">＋ 追加</button>
  </div>
</header>

<!-- ===== FILTER BAR ===== -->
<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-chip" onclick="setFilter('mine',this)">自分のタスク</button>
  <button class="filter-chip" onclick="setFilter('未着手',this)">未着手</button>
  <button class="filter-chip" onclick="setFilter('進行中',this)">進行中</button>
  <button class="filter-chip" onclick="setFilter('完了',this)">完了</button>
  <button class="filter-chip" onclick="setFilter('保留',this)">保留</button>
  <button class="filter-chip" onclick="setFilter('overdue',this)">⚠ 期限切れ</button>
  <button class="filter-chip" onclick="setFilter('high',this)">🔴 高優先</button>
  <button class="filter-chip" onclick="setFilter('診療',this)">診療</button>
  <button class="filter-chip" onclick="setFilter('経営',this)">経営</button>
  <button class="filter-chip" onclick="setFilter('スタッフ',this)">スタッフ</button>
  <button class="filter-chip" onclick="setFilter('設備',this)">設備</button>
</div>

<main>
  <div class="stats-bar" id="statsBar"></div>
  <div id="viewContainer"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
</main>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">タスクを追加</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label>タイトル *</label>
      <input type="text" id="fTitle" placeholder="タスクのタイトル">
    </div>

    <div class="form-group">
      <label>メモ</label>
      <textarea id="fNote" placeholder="詳細・備考など"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="fCat">
          <option value="診療">診療</option>
          <option value="経営">経営</option>
          <option value="スタッフ">スタッフ</option>
          <option value="設備">設備</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>期限</label>
        <input type="date" id="fDate">
      </div>
    </div>

    <div class="form-group">
      <label>優先度</label>
      <div class="radio-group">
        <input type="radio" class="radio-option" name="priority" id="pri-high" value="high">
        <label for="pri-high" class="radio-label">🔴 高</label>
        <input type="radio" class="radio-option" name="priority" id="pri-med" value="med" checked>
        <label for="pri-med" class="radio-label">🟡 中</label>
        <input type="radio" class="radio-option" name="priority" id="pri-low" value="low">
        <label for="pri-low" class="radio-label">🔵 低</label>
      </div>
    </div>

    <div class="form-group">
      <label>ステータス</label>
      <div class="status-group">
        <input type="radio" class="status-option" name="status" id="st-todo" value="未着手" checked>
        <label for="st-todo" class="status-label">未着手</label>
        <input type="radio" class="status-option" name="status" id="st-doing" value="進行中">
        <label for="st-doing" class="status-label">進行中</label>
        <input type="radio" class="status-option" name="status" id="st-done" value="完了">
        <label for="st-done" class="status-label">完了</label>
        <input type="radio" class="status-option" name="status" id="st-hold" value="保留">
        <label for="st-hold" class="status-label">保留</label>
      </div>
    </div>

    <div class="form-group">
      <label>担当者（複数選択可）</label>
      <div id="assigneeGrid"></div>
    </div>

    <div class="form-group">
      <label>タグ（カンマ区切り）</label>
      <input type="text" id="fTags" placeholder="例: 要確認, 急ぎ">
    </div>

    <div class="modal-footer">
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteTask()">削除</button>
      <button class="btn-save" id="btnSave" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, set, remove, onValue, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey:            'AIzaSyDdMe7feUF6CKPHH0YIx7Suk-WnXtOYUu8',
  authDomain:        'kalmia-shift.firebaseapp.com',
  databaseURL:       'https://kalmia-shift-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:         'kalmia-shift',
  storageBucket:     'kalmia-shift.firebasestorage.app',
  messagingSenderId: '714175473480',
  appId:             '1:714175473480:web:7d6626a46e4a9dcb1fb57d'
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ===== STAFF =====
const STAFF = {
  DR: ['院長','嶋中','保刈','篠田'],
  DH: ['鶴田','吉田','高木','松本','野崎','山田','ハノワ'],
  DA: ['田宮','田中','百々']
};

const ROLE_OF = {};
Object.entries(STAFF).forEach(([role, names]) => names.forEach(n => ROLE_OF[n] = role));

const DEFAULTS = {
  sugihira:'1001', shimanaka:'1002', hokari:'1003', shinoda:'1004',
  tsuruta:'2001',  yoshida:'2002',   takagi:'2003', matsumoto:'2004',
  nozaki:'2005',   yamada:'2006',    hanowa:'2007',
  tamiya:'3001',   tanaka:'3002',    momo:'3003'
};

// ===== STATE =====
let currentUser = null;
let tasks = {};
let currentFilter = 'all';
let currentView = 'board';
let editingId = null;
let saving = false;

// ===== LOGIN =====
function doLogin() {
  const sel  = document.getElementById('loginStaff').value;
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');

  if (!sel) { err.textContent = 'スタッフを選択してください'; return; }
  const [name, role, staffId] = sel.split('|');
  const stored = JSON.parse(localStorage.getItem('carmia_passwords') || '{}');
  const correct = stored[staffId] || DEFAULTS[staffId] || '';

  if (pass !== correct) { err.textContent = 'パスワードが違います'; return; }

  currentUser = { name, role, staffId };
  sessionStorage.setItem('taskUser', JSON.stringify(currentUser));
  err.textContent = '';
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('userBadge').textContent = name;
  initTasks();
}

// ===== INIT =====
function initTasks() {
  buildAssigneeGrid();
  const tasksRef = ref(db, 'tasks');
  onValue(tasksRef, snap => {
    tasks = snap.val() || {};
    render();
  });
}

// ===== DATE HELPERS =====
function todayStr() { return new Date().toISOString().split('T')[0]; }
function isOverdue(d) { return d && d < todayStr(); }
function isToday(d)   { return d === todayStr(); }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function daysLeft(d) {
  if (!d) return null;
  return Math.round((new Date(d+'T00:00:00') - new Date(todayStr()+'T00:00:00')) / 86400000);
}

// ===== FILTER =====
function getFiltered() {
  return Object.entries(tasks).filter(([id, t]) => {
    if (currentFilter === 'all')    return true;
    if (currentFilter === 'mine')   return (t.assignees || []).includes(currentUser.name);
    if (currentFilter === 'overdue') return isOverdue(t.date) && t.status !== '完了';
    if (currentFilter === 'high')   return t.priority === 'high';
    if (['未着手','進行中','完了','保留'].includes(currentFilter)) return t.status === currentFilter;
    if (['診療','経営','スタッフ','設備','その他'].includes(currentFilter)) return t.category === currentFilter;
    return true;
  }).map(([id, t]) => ({ id, ...t }));
}

// ===== RENDER =====
function render() {
  renderStats();
  currentView === 'board' ? renderBoard() : renderList();
}

function renderStats() {
  const all = Object.values(tasks);
  const mine = all.filter(t => (t.assignees||[]).includes(currentUser.name));
  const doing = all.filter(t => t.status === '進行中').length;
  const overdue = all.filter(t => isOverdue(t.date) && t.status !== '完了').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">全タスク</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--low)">${mine.length}</div><div class="stat-label">自分担当</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--med)">${doing}</div><div class="stat-label">進行中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--high)">${overdue}</div><div class="stat-label">期限切れ</div></div>
  `;
}

function assigneeChips(assignees) {
  if (!assignees || !assignees.length) return '';
  return assignees.map(name => {
    const role = ROLE_OF[name] || '';
    const cls = role === 'DR' ? 'chip-dr' : role === 'DH' ? 'chip-dh' : role === 'DA' ? 'chip-da' : 'chip-other';
    return `<span class="assignee-chip ${cls}">${name}</span>`;
  }).join('');
}

function taskCardHtml(t) {
  const od  = isOverdue(t.date) && t.status !== '完了';
  const tod = isToday(t.date)   && t.status !== '完了';
  const dl  = daysLeft(t.date);
  let dateLabel = '';
  if (t.date) {
    let cls = 'badge-date';
    let txt = fmtDate(t.date);
    if (od)      { cls += ' overdue-date'; txt = `⚠ ${txt}`; }
    else if (tod){ cls += ' today-date'; txt = `今日`; }
    else if (dl !== null && dl <= 3) txt = `あと${dl}日`;
    dateLabel = `<span class="badge ${cls}">${txt}</span>`;
  }
  const priCls = { high:'badge-high', med:'badge-med', low:'badge-low' };
  const priLbl = { high:'高', med:'中', low:'低' };
  const tags = (t.tags||[]).map(g => `<span class="tag">${esc(g)}</span>`).join('');
  const chips = assigneeChips(t.assignees);
  return `
    <div class="task-card pri-${t.priority} ${od?'overdue':''}" onclick="window._openTask('${t.id}')">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="badge badge-cat">${t.category||'その他'}</span>
        <span class="badge ${priCls[t.priority]}">${priLbl[t.priority]}</span>
        ${dateLabel}
      </div>
      ${chips ? `<div class="task-assignees">${chips}</div>` : ''}
      ${tags  ? `<div class="task-tags">${tags}</div>` : ''}
    </div>`;
}

function renderBoard() {
  const filtered = getFiltered();
  const cols = [
    { status:'未着手', cls:'col-todo'  },
    { status:'進行中', cls:'col-doing' },
    { status:'完了',   cls:'col-done'  },
    { status:'保留',   cls:'col-hold'  },
  ];
  let html = '<div class="board">';
  for (const col of cols) {
    const items = filtered.filter(t => t.status === col.status);
    const dot = `<span class="col-dot"></span>`;
    html += `
      <div class="column">
        <div class="column-header ${col.cls}">
          <div class="column-title">${dot}${col.status}</div>
          <span class="column-count">${items.length}</span>
        </div>
        <div class="column-body">
          ${items.length ? items.map(taskCardHtml).join('') : '<div class="empty">なし</div>'}
        </div>
      </div>`;
  }
  html += '</div>';
  document.getElementById('viewContainer').innerHTML = html;
}

function renderList() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('viewContainer').innerHTML = '<div class="empty" style="padding:60px">タスクがありません</div>';
    return;
  }
  const priCls = { high:'badge-high', med:'badge-med', low:'badge-low' };
  const priLbl = { high:'高優先', med:'中優先', low:'低優先' };
  const html = filtered.map(t => {
    const od   = isOverdue(t.date) && t.status !== '完了';
    const dl   = daysLeft(t.date);
    let dateStr = '';
    if (t.date) {
      dateStr = od ? `⚠ ${fmtDate(t.date)} 期限切れ` : isToday(t.date) ? '今日' : dl !== null && dl <= 3 ? `あと${dl}日` : fmtDate(t.date)+'期限';
    }
    const chips = assigneeChips(t.assignees);
    return `
      <div class="list-item pri-${t.priority} ${od?'overdue':''}" onclick="window._openTask('${t.id}')">
        <div class="list-content">
          <div class="list-title ${t.status==='完了'?'done-title':''}">${esc(t.title)}</div>
          <div class="list-sub">
            <span>${t.category||'その他'}</span>
            <span>${t.status}</span>
            ${dateStr ? `<span>${dateStr}</span>` : ''}
          </div>
          ${chips ? `<div class="task-assignees" style="margin-top:5px">${chips}</div>` : ''}
        </div>
        <div class="list-right">
          <span class="badge ${priCls[t.priority]}">${priLbl[t.priority]}</span>
        </div>
      </div>`;
  }).join('');
  document.getElementById('viewContainer').innerHTML = `<div class="list-view">${html}</div>`;
}

// ===== ASSIGNEE GRID =====
function buildAssigneeGrid() {
  const grid = document.getElementById('assigneeGrid');
  let html = '';
  for (const [role, names] of Object.entries(STAFF)) {
    html += `<div class="assignee-role-group role-${role.toLowerCase()}">
      <div class="assignee-role-label">${role}</div>
      <div class="assignee-grid">`;
    for (const name of names) {
      const id = `asgn_${name}`;
      html += `<input type="checkbox" class="assignee-checkbox" id="${id}" value="${name}">
               <label for="${id}" class="assignee-label">${name}</label>`;
    }
    html += '</div></div>';
  }
  grid.innerHTML = html;
}

// ===== MODAL =====
function openModal(id = null) {
  editingId = id;
  if (id && tasks[id]) {
    const t = tasks[id];
    document.getElementById('modalTitle').textContent = 'タスクを編集';
    document.getElementById('fTitle').value = t.title || '';
    document.getElementById('fNote').value  = t.note  || '';
    document.getElementById('fCat').value   = t.category || '診療';
    document.getElementById('fDate').value  = t.date  || '';
    document.getElementById('fTags').value  = (t.tags||[]).join(', ');
    document.querySelector(`input[name="priority"][value="${t.priority||'med'}"]`).checked = true;
    document.querySelector(`input[name="status"][value="${t.status||'未着手'}"]`).checked = true;
    // 担当者チェック
    document.querySelectorAll('.assignee-checkbox').forEach(cb => {
      cb.checked = (t.assignees||[]).includes(cb.value);
    });
    document.getElementById('btnDelete').style.display = '';
  } else {
    document.getElementById('modalTitle').textContent = 'タスクを追加';
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value  = '';
    document.getElementById('fCat').value   = '診療';
    document.getElementById('fDate').value  = '';
    document.getElementById('fTags').value  = '';
    document.querySelector('#pri-med').checked = true;
    document.querySelector('#st-todo').checked  = true;
    document.querySelectorAll('.assignee-checkbox').forEach(cb => cb.checked = false);
    document.getElementById('btnDelete').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 300);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

async function saveTask() {
  if (saving) return;
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }

  const assignees = [...document.querySelectorAll('.assignee-checkbox:checked')].map(cb => cb.value);

  const data = {
    title,
    note:      document.getElementById('fNote').value.trim(),
    category:  document.getElementById('fCat').value,
    date:      document.getElementById('fDate').value,
    priority:  document.querySelector('input[name="priority"]:checked').value,
    status:    document.querySelector('input[name="status"]:checked').value,
    assignees,
    tags: document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean),
    updatedAt: Date.now(),
    updatedBy: currentUser.name,
  };

  saving = true;
  document.getElementById('btnSave').disabled = true;

  try {
    if (editingId) {
      await set(ref(db, `tasks/${editingId}`), { ...tasks[editingId], ...data });
      showToast('更新しました');
    } else {
      data.createdAt = Date.now();
      data.createdBy = currentUser.name;
      await push(ref(db, 'tasks'), data);
      showToast('追加しました');
    }
    closeModal();
  } catch(e) {
    showToast('保存に失敗しました');
    console.error(e);
  } finally {
    saving = false;
    document.getElementById('btnSave').disabled = false;
  }
}

async function deleteTask() {
  if (!editingId) return;
  if (!confirm('このタスクを削除しますか？')) return;
  try {
    await remove(ref(db, `tasks/${editingId}`));
    closeModal();
    showToast('削除しました');
  } catch(e) {
    showToast('削除に失敗しました');
  }
}

// ===== UTILS =====
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-board').classList.toggle('active', v === 'board');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== EXPOSE TO WINDOW =====
window.doLogin = doLogin;
window.setFilter = setFilter;
window.setView = setView;
window.openModal = openModal;
window.closeModal = closeModal;
window.handleOverlayClick = handleOverlayClick;
window.saveTask = saveTask;
window.deleteTask = deleteTask;
window._openTask = (id) => openModal(id);

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('overlay').classList.contains('open')) saveTask();
  }
});
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ===== SESSION RESTORE =====
(function() {
  const saved = sessionStorage.getItem('taskUser');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('userBadge').textContent = currentUser.name;
      initTasks();
    } catch(e) {}
  }
})();
</script>
</body>
</html>
