<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク管理 | カルミアデンタル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root {
    --mint: #4ecdc4;
    --coral: #ff6b6b;
    --yellow: #ffd93d;
    --lavender: #a29bfe;
    --sky: #74b9ff;
    --pink: #fd79a8;
    --green: #55efc4;
    --orange: #fdcb6e;
    --bg: #f0f8ff;
    --surface: #ffffff;
    --surface2: #f8fdff;
    --border: #e0f0f8;
    --text: #2d3436;
    --text-muted: #636e72;
    --high: #ff6b6b;
    --high-light: #fff0f0;
    --med: #ffd93d;
    --med-light: #fffbec;
    --low: #74b9ff;
    --low-light: #f0f6ff;
    --shadow: 0 4px 20px rgba(78,205,196,0.12);
    --shadow-lg: 0 8px 32px rgba(78,205,196,0.18);
    --radius: 20px;
    --radius-sm: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(78,205,196,0.1);
  }

  .header-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    background: linear-gradient(135deg, var(--mint), var(--sky));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .header-title span {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    display: block;
    -webkit-text-fill-color: var(--text-muted);
  }

  .header-center { flex: 1; display: flex; justify-content: center; }

  .user-badge {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: white;
    font-size: 12px;
    font-weight: 800;
    padding: 5px 14px;
    border-radius: 100px;
    font-family: 'Nunito', sans-serif;
  }

  .header-actions { display: flex; gap: 6px; align-items: center; }

  .btn-icon {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover { background: white; border-color: var(--mint); color: var(--mint); transform: translateY(-1px); }
  .btn-icon.active { background: linear-gradient(135deg,var(--mint),var(--sky)); border-color: transparent; color: white; }

  .btn-add {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 0 16px;
    height: 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(78,205,196,0.35);
  }

  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(78,205,196,0.45); }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 8px 14px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 4px 13px;
    font-size: 11px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .filter-chip:hover { border-color: var(--mint); color: var(--mint); background: white; }
  .filter-chip.active { background: linear-gradient(135deg,var(--mint),var(--sky)); border-color: transparent; color: white; box-shadow: 0 2px 8px rgba(78,205,196,0.3); }

  /* ===== MAIN ===== */
  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ===== STATS ===== */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }

  .stat-card:hover { transform: translateY(-2px); }

  .stat-num {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 30px;
    line-height: 1;
  }

  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-weight: 700; }

  /* ===== BOARD ===== */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .board { grid-template-columns: 1fr; } }

  .column {
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: visible;
    box-shadow: var(--shadow);
  }

  .column-header {
    padding: 12px 14px 10px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .col-todo  .column-header { background: linear-gradient(135deg,#f8f9fa,#e9ecef); }
  .col-doing .column-header { background: linear-gradient(135deg,#fff8e6,#ffeaa7); }
  .col-done  .column-header { background: linear-gradient(135deg,#e8fdf8,#c7f4ed); }
  .col-hold  .column-header { background: linear-gradient(135deg,#f0f0ff,#dfe6fd); }

  .column-title {
    font-size: 12px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .col-dot { width: 8px; height: 8px; border-radius: 50%; }
  .col-todo  .col-dot { background: #b2bec3; }
  .col-doing .col-dot { background: var(--yellow); box-shadow: 0 0 6px rgba(255,217,61,0.6); }
  .col-done  .col-dot { background: var(--mint); box-shadow: 0 0 6px rgba(78,205,196,0.6); }
  .col-hold  .col-dot { background: var(--lavender); box-shadow: 0 0 6px rgba(162,155,254,0.6); }

  .column-count {
    font-size: 11px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    color: var(--text-muted);
    background: rgba(255,255,255,0.7);
    padding: 2px 8px;
    border-radius: 100px;
  }

  .column-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 80px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 11px 36px 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .task-card:hover { box-shadow: 0 6px 20px rgba(78,205,196,0.15); border-color: var(--mint); transform: translateY(-2px); }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 4px;
    border-radius: 0 4px 4px 0;
  }

  .task-card.pri-high::before { background: var(--high); }
  .task-card.pri-med::before  { background: var(--yellow); }
  .task-card.pri-low::before  { background: var(--low); }
  .task-card.overdue { border-color: #ffb3b3; background: #fffafa; }
  .task-card.done-card { opacity: 0.5; }
  .task-card.done-card .btn-done { background: var(--mint); border-color: var(--mint); color: white; }

  .btn-done {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .btn-done:hover { border-color: var(--mint); background: #e8fdf8; color: var(--mint); transform: scale(1.15); }

  .task-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 7px;
  }

  .task-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
  }

  .badge-cat { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
  .badge-high { background: var(--high-light); color: var(--high); }
  .badge-med  { background: var(--med-light);  color: #b8860b; }
  .badge-low  { background: var(--low-light);  color: var(--sky); }
  .badge-date { background: #e8fdf8; color: var(--mint); margin-left: auto; }
  .badge-date.overdue-date { background: var(--high-light); color: var(--high); }
  .badge-date.today-date   { background: var(--med-light);  color: #b8860b; }

  .task-assignees { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 3px; }

  .assignee-chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
  }

  .chip-dr    { background: #e0faf7; color: #00b894; }
  .chip-dh    { background: #ede7ff; color: #6c5ce7; }
  .chip-da    { background: #fff4e0; color: #e67e22; }
  .chip-other { background: var(--bg); color: var(--text-muted); }

  .task-tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }
  .tag { font-size: 10px; background: var(--bg); color: var(--text-muted); padding: 2px 6px; border-radius: 6px; border: 1px solid var(--border); }

  /* ===== LIST VIEW ===== */
  .list-view { display: flex; flex-direction: column; gap: 6px; }

  .list-item {
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    padding-left: 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.03);
  }

  .list-item::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 4px;
    border-radius: 0 4px 4px 0;
  }

  .list-item.pri-high::before { background: var(--high); }
  .list-item.pri-med::before  { background: var(--yellow); }
  .list-item.pri-low::before  { background: var(--low); }
  .list-item:hover { box-shadow: 0 4px 16px rgba(78,205,196,0.15); border-color: var(--mint); transform: translateY(-1px); }
  .list-item.overdue { border-color: #ffb3b3; }

  .list-content { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 700; }
  .list-title.done-title { text-decoration: line-through; color: var(--text-muted); }
  .list-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .list-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  /* ===== MODAL ===== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,52,54,0.4);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  @media (min-width: 600px) {
    .overlay { align-items: center; }
    .modal { border-radius: var(--radius) !important; max-width: 540px; }
  }

  .modal {
    background: white;
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 24px 20px;
    transform: translateY(40px);
    transition: transform 0.25s;
    box-shadow: 0 -8px 40px rgba(78,205,196,0.15);
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--mint), var(--sky));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .btn-close {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    color: var(--text-muted);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .btn-close:hover { background: var(--high-light); border-color: var(--high); color: var(--high); }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.06em;
    font-family: 'Nunito', sans-serif;
  }

  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: white;
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(78,205,196,0.12); }
  textarea { resize: vertical; min-height: 70px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .radio-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .radio-option { display: none; }
  .radio-label {
    padding: 7px 14px;
    border: 2px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  #pri-high:checked + .radio-label { background: var(--high-light); border-color: var(--high); color: var(--high); }
  #pri-med:checked  + .radio-label { background: var(--med-light);  border-color: #e0a800; color: #b8860b; }
  #pri-low:checked  + .radio-label { background: var(--low-light);  border-color: var(--sky); color: var(--sky); }

  .status-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-option { display: none; }
  .status-label {
    padding: 7px 14px;
    border: 2px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .status-option:checked + .status-label {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    border-color: transparent;
    color: white;
    box-shadow: 0 2px 8px rgba(78,205,196,0.3);
  }

  .assignee-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .assignee-checkbox { display: none; }
  .assignee-label {
    padding: 5px 12px;
    border: 2px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .assignee-role-label { font-size: 10px; font-weight: 800; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.06em; font-family: 'Nunito', sans-serif; }
  .assignee-role-group { margin-bottom: 8px; }
  .role-dr .assignee-checkbox:checked + .assignee-label { background: #e0faf7; border-color: #00b894; color: #00b894; }
  .role-dh .assignee-checkbox:checked + .assignee-label { background: #ede7ff; border-color: #6c5ce7; color: #6c5ce7; }
  .role-da .assignee-checkbox:checked + .assignee-label { background: #fff4e0; border-color: #e67e22; color: #e67e22; }

  .modal-footer {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 2px solid var(--border);
  }

  .btn-delete {
    background: white;
    border: 2px solid #ffb3b3;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--high);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-delete:hover { background: var(--high-light); }

  .btn-save {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: white;
    cursor: pointer;
    flex: 1;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(78,205,196,0.35);
  }

  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(78,205,196,0.45); }
  .btn-save:disabled { background: #b2bec3; box-shadow: none; cursor: not-allowed; transform: none; }

  .btn-done-modal {
    background: white;
    border: 2px solid var(--mint);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--mint);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-done-modal:hover { background: #e8fdf8; }

  .empty { text-align: center; padding: 28px 12px; color: var(--text-muted); font-size: 12px; }

  /* ===== LOADING ===== */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; color: var(--text-muted); font-size: 13px; gap: 10px;
  }

  .spinner {
    width: 22px; height: 22px;
    border: 3px solid var(--border);
    border-top-color: var(--mint);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: linear-gradient(135deg, var(--text), #636e72);
    color: white;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    z-index: 300;
    transition: transform 0.3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== FAB ===== */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--mint), var(--sky));
    color: white;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(78,205,196,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    transition: all 0.2s;
  }
  .fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 10px 32px rgba(78,205,196,0.6); }
  .fab:active { transform: scale(0.95); }

  @media print {
    header, .filter-bar, .stats-bar, .btn-add, .btn-icon, .overlay { display: none !important; }
    .board { grid-template-columns: repeat(4,1fr); }
    .task-card { break-inside: avoid; }
    body { background: white; }
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- ===== NO LOGIN - ポータルセッション引き継ぎ ===== -->

<!-- ===== HEADER ===== -->
<header>
  <div class="header-title">
    <a href="https://kalmia-dc.github.io/portal/" style="text-decoration:none;display:flex;align-items:center;gap:6px;">

<script type="module">

};

// ===== GOOGLE TASKS =====
const GCLIENT_ID = '218253038073-v3nrmbet629g11ljjd1t0rqbn6t4evpr.apps.googleusercontent.com';
const GSCOPE     = 'https://www.googleapis.com/auth/tasks';
let gAccessToken = null;

// ===== STAFF =====
const STAFF = {

// ===== ユーザー特定 =====
function resolveUser() {

// ===== STATE =====
let currentUser = resolveUser();
let tasks = {};
let currentFilter = 'all';

const isIncho = () => currentUser?.staffId === 'sugihira' || currentUser?.name === '院長';

// ===== 名前選択バナー =====

    </div>`;

window._setName = function() {
  const sel = document.getElementById('nameSelect').value;
  if (!sel) return;

    '鶴田':'tsuruta','吉田':'yoshida','高木':'takagi','松本':'matsumoto','野崎':'nozaki','山田':'yamada','ハノワ':'hanowa',
    '田宮':'tamiya','田中':'tanaka','百々':'momo' };
  currentUser = { name: sel, role: rm[sel]||'DH', staffId: sidMap[sel]||'' };

// ===== GOOGLE AUTH SETUP =====
function setupGoogleForIncho() {
  if (!isIncho()) return;

  // Google同期ボタンとバナーを表示
  document.getElementById('btnGoogleSync').style.display = 'flex';
  const banner = document.getElementById('googleBanner');
  banner.style.display = 'flex';

  // GSIライブラリの読み込み待ち
  waitForGsi().then(() => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GCLIENT_ID,
      scope: GSCOPE,
      callback: async (resp) => {
        if (resp.error) { showToast('Googleサインインに失敗しました'); return; }
        gAccessToken = resp.access_token;
        document.getElementById('syncDot').style.display = 'block';
        document.getElementById('googleBannerText').textContent = 'Googleタスクと連携中';
        document.getElementById('googleSignInBtn').textContent = '今すぐ同期';
        document.getElementById('googleSignInBtn').style.background = '#34a853';
        document.getElementById('googleSignInBtn').onclick = () => syncGoogleTasks();
        // 認証成功後すぐ同期
        await syncGoogleTasks();
      },
    });

    // トークンがセッションに残っていれば即同期試行（prompt不要）
    const savedToken = sessionStorage.getItem('gAccessToken');
    if (savedToken) {
      gAccessToken = savedToken;
      document.getElementById('syncDot').style.display = 'block';
      document.getElementById('googleBannerText').textContent = 'Googleタスクと連携中';
      document.getElementById('googleSignInBtn').textContent = '今すぐ同期';
      document.getElementById('googleSignInBtn').style.background = '#34a853';
      document.getElementById('googleSignInBtn').onclick = () => syncGoogleTasks();
      syncGoogleTasks();
    }
  });
}

function waitForGsi() {
  return new Promise(resolve => {
    if (typeof google !== 'undefined' && google.accounts) { resolve(); return; }
    const interval = setInterval(() => {
      if (typeof google !== 'undefined' && google.accounts) { clearInterval(interval); resolve(); }
    }, 200);
  });
}

window.startGoogleAuth = function() {
  if (!tokenClient) { showToast('少しお待ちください...'); return; }
  if (gAccessToken) { syncGoogleTasks(); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
};

// ===== GOOGLE TASKS 同期 =====
window.syncGoogleTasks = async function() {
  if (!gAccessToken) { startGoogleAuth(); return; }

  const banner = document.getElementById('googleBannerText');
  banner.textContent = '同期中...';

  try {
    // タスクリスト一覧を取得
    const listRes = await gFetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists?maxResults=20');
    if (!listRes.ok) {
      // トークン切れの可能性
      if (listRes.status === 401) {
        gAccessToken = null;
        sessionStorage.removeItem('gAccessToken');
        document.getElementById('syncDot').style.display = 'none';
        banner.textContent = 'セッション切れ。再サインインしてください';
        document.getElementById('googleSignInBtn').textContent = 'Googleでサインイン';
        document.getElementById('googleSignInBtn').style.background = '#4285f4';
        document.getElementById('googleSignInBtn').onclick = () => startGoogleAuth();
        return;
      }
      throw new Error(`HTTP ${listRes.status}`);
    }
    const listData = await listRes.json();
    const lists = listData.items || [];

    // 全リストのタスクを取得
    let allGTasks = [];
    for (const list of lists) {
      const taskRes = await gFetch(
        `https://tasks.googleapis.com/tasks/v1/lists/${list.id}/tasks?showCompleted=false&showHidden=false&maxResults=100`
      );
      if (!taskRes.ok) continue;
      const taskData = await taskRes.json();
      const items = (taskData.items || []).map(t => ({ ...t, _listId: list.id, _listTitle: list.title }));
      allGTasks = allGTasks.concat(items);
    }

    // FirebaseにないGoogleタスクをインポート
    const existingGIds = new Set(
      Object.values(tasks).map(t => t.googleTaskId).filter(Boolean)
    );

    let imported = 0;
    for (const gt of allGTasks) {
      if (existingGIds.has(gt.id)) {
        // 既存タスクの完了状態を同期
        const fbTask = Object.entries(tasks).find(([,t]) => t.googleTaskId === gt.id);
        if (fbTask && gt.status === 'completed' && fbTask[1].status !== '完了') {
          await set(ref(db, `tasks/${fbTask[0]}/status`), '完了');
        }
        continue;
      }
      // 新規インポート
      const due = gt.due ? gt.due.split('T')[0] : '';
      const newTask = {
        title:        gt.title || '（タイトルなし）',
        note:         gt.notes || '',
        category:     'その他',
        date:         due,
        priority:     'med',
        status:       gt.status === 'completed' ? '完了' : '未着手',
        assignees:    ['院長'],
        tags:         [`Gタスク`, gt._listTitle].filter(Boolean),
        googleTaskId: gt.id,
        googleListId: gt._listId,
        createdAt:    Date.now(),
        createdBy:    '院長（Google）',
        updatedAt:    Date.now(),
        updatedBy:    '院長（Google）',
      };
      await push(ref(db, 'tasks'), newTask);
      imported++;
    }

    // トークンをセッションに保存
    sessionStorage.setItem('gAccessToken', gAccessToken);

    const msg = imported > 0 ? `${imported}件のGoogleタスクを取り込みました` : 'Googleタスクと同期済み';
    banner.textContent = `✅ ${msg}`;
    showToast(msg);
    setTimeout(() => { banner.textContent = 'Googleタスクと連携中'; }, 3000);

  } catch(e) {
    console.error(e);
    banner.textContent = '同期に失敗しました';
    showToast('同期に失敗しました: ' + e.message);
  }
};

// Firebase上でタスクを完了にした時、Googleタスクも完了にする
async function completeGoogleTask(googleTaskId, googleListId) {
  if (!gAccessToken || !googleTaskId || !googleListId) return;
  try {
    await gFetch(
      `https://tasks.googleapis.com/tasks/v1/lists/${googleListId}/tasks/${googleTaskId}`,
      {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'completed' })
      }
    );
  } catch(e) { console.warn('Google完了更新失敗:', e); }
}

// アプリのタスクをGoogleタスクに送る
window.exportToGoogle = async function() {
  if (!gAccessToken) { showToast('先にGoogleサインインしてください'); return; }
  if (!editingId || !tasks[editingId]) return;
  const t = tasks[editingId];

  // すでにGoogleタスクと紐づいている場合はスキップ
  if (t.googleTaskId) { showToast('すでにGoogleタスクと連携済みです'); return; }

  const btn = document.getElementById('btnExportGoogle');
  btn.textContent = '送信中...';
  btn.disabled = true;

  try {
    // デフォルトリスト（@default）に追加
    const body = {
      title: t.title,
      notes: [t.note, t.category ? `カテゴリ: ${t.category}` : '', (t.tags||[]).length ? `タグ: ${t.tags.join(', ')}` : ''].filter(Boolean).join('\n'),
    };
    if (t.date) body.due = `${t.date}T00:00:00.000Z`;

    const res = await gFetch(
      'https://tasks.googleapis.com/tasks/v1/lists/@default/tasks',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const created = await res.json();

    // FirebaseのタスクにGoogleタスクIDを紐づけ保存
    await set(ref(db, `tasks/${editingId}/googleTaskId`), created.id);
    await set(ref(db, `tasks/${editingId}/googleListId`), '@default');

    showToast('Googleタスクに送りました ✅');
    btn.textContent = '✅ 送信済み';
  } catch(e) {
    showToast('送信に失敗しました: ' + e.message);
    btn.textContent = 'Googleタスクに送る';
    btn.disabled = false;
  }
};

function gFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${gAccessToken}`,
      ...(opts.headers || {})
    }
  });
}

function init() {

    document.getElementById('userBadge').textContent = currentUser.name;

    tasks = snap.val() || {};
    render();

// ===== DATE HELPERS =====
function todayStr() { return new Date().toISOString().split('T')[0]; }
function isOverdue(d) { return d && d < todayStr(); }
function isToday(d)   { return d === todayStr(); }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function daysLeft(d) {
  if (!d) return null;
  return Math.round((new Date(d+'T00:00:00') - new Date(todayStr()+'T00:00:00')) / 86400000);
}

// ===== FILTER =====
function getFiltered() {
  return Object.entries(tasks).filter(([id, t]) => {
    // 全員分フィルター：制限なし
    if (currentFilter === 'everyone') return true;

    // それ以外は自分が作成 or 担当のタスクのみ
    const isRelated = currentUser && (() => {
      const name = currentUser.name;
      // ① 自分が担当
      if ((t.assignees||[]).includes(name)) return true;
      // ② 自分が作成（通常 or Google取込）
      if (t.createdBy === name) return true;
      if (t.createdBy === `${name}（Google）`) return true;
      return false;
    })();
    if (!isRelated) return false;

    if (currentFilter === 'all')     return true;
    if (currentFilter === 'mine')    return (t.assignees||[]).includes(currentUser.name);
    if (currentFilter === 'overdue') return isOverdue(t.date) && t.status !== '完了';
    if (currentFilter === 'high')    return t.priority === 'high';
    if (['未着手','進行中','完了','保留'].includes(currentFilter)) return t.status === currentFilter;
    if (['診療','経営','スタッフ','設備','その他'].includes(currentFilter)) return t.category === currentFilter;
    return true;
  }).map(([id, t]) => ({ id, ...t }));
}

// ===== RENDER =====
function render() { renderStats(); currentView==='board' ? renderBoard() : renderList(); }

function renderStats() {
  const all = Object.values(tasks);
  const isEveryone = currentFilter === 'everyone';

  const related = isEveryone ? all : (currentUser ? all.filter(t => {
    const name = currentUser.name;
    return (t.assignees||[]).includes(name) ||
           t.createdBy === name ||
           t.createdBy === `${name}（Google）`;
  }) : []);
  const mine      = currentUser ? related.filter(t => (t.assignees||[]).includes(currentUser.name)) : [];
  const incomplete = related.filter(t => t.status !== '完了').length;
  const overdue    = related.filter(t => isOverdue(t.date) && t.status !== '完了').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${related.length}</div><div class="stat-label">${isEveryone ? '全タスク' : '自分のタスク'}</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--low)">${mine.length}</div><div class="stat-label">担当中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--med)">${incomplete}</div><div class="stat-label">未完了</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--high)">${overdue}</div><div class="stat-label">期限切れ</div></div>`;
}

function assigneeChips(assignees) {
  if (!assignees||!assignees.length) return '';
  return assignees.map(name => {
    const r = ROLE_OF[name]||'';
    const cls = r==='DR'?'chip-dr':r==='DH'?'chip-dh':r==='DA'?'chip-da':'chip-other';
    return `<span class="assignee-chip ${cls}">${name}</span>`;
  }).join('');
}

function taskCardHtml(t) {
  const od = isOverdue(t.date) && t.status!=='完了';
  const dl = daysLeft(t.date);
  let dateLabel = '';
  if (t.date) {
    let cls='badge-date', txt=fmtDate(t.date);
    if (od)                          { cls+=' overdue-date'; txt=`⚠ ${txt}`; }
    else if (isToday(t.date))        { cls+=' today-date'; txt='今日'; }
    else if (dl!==null && dl<=3)     { txt=`あと${dl}日`; }
    dateLabel = `<span class="badge ${cls}">${txt}</span>`;
  }
  const priCls={high:'badge-high',med:'badge-med',low:'badge-low'};
  const priLbl={high:'高',med:'中',low:'低'};
  const tags  = (t.tags||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join('');
  const chips = assigneeChips(t.assignees);
  const isDone = t.status === '完了';
  const gIcon  = t.googleTaskId ? `<span style="font-size:10px;color:#4285f4;margin-left:2px;">G</span>` : '';

  // タスク種別ラベル
  const myName = currentUser?.name || '';
  const isMeCreated  = t.createdBy === myName || t.createdBy === `${myName}（Google）`;
  const isMeAssigned = (t.assignees||[]).includes(myName);
  const assigneesWithoutMe = (t.assignees||[]).filter(n => n !== myName);
  let typeLabel = '';
  if (isMeCreated && isMeAssigned && assigneesWithoutMe.length === 0) {
    // 自分で作って自分がやる
    typeLabel = `<span style="font-size:10px;background:#e8fdf8;color:#00b894;padding:2px 7px;border-radius:100px;font-weight:700;">自分</span>`;
  } else if (isMeCreated && !isMeAssigned) {
    // 自分が作って誰かにお願い
    typeLabel = `<span style="font-size:10px;background:#fff4e0;color:#e67e22;padding:2px 7px;border-radius:100px;font-weight:700;">→ 依頼</span>`;
  } else if (!isMeCreated && isMeAssigned) {
    // 誰かが作って自分にお願い
    const from = t.createdBy || '不明';
    typeLabel = `<span style="font-size:10px;background:#f0f0ff;color:#6c5ce7;padding:2px 7px;border-radius:100px;font-weight:700;">${from} より</span>`;
  } else if (isMeCreated && isMeAssigned && assigneesWithoutMe.length > 0) {
    // 自分も担当で他にも依頼
    typeLabel = `<span style="font-size:10px;background:#e8fdf8;color:#00b894;padding:2px 7px;border-radius:100px;font-weight:700;">自分＋依頼</span>`;
  }

  return `
    <div class="task-card pri-${t.priority} ${od?'overdue':''} ${isDone?'done-card':''}" onclick="window._openTask('${t.id}')">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;">
        ${typeLabel}${gIcon}
      </div>
      <div class="task-title" style="${isDone?'text-decoration:line-through;color:var(--text-muted);':''}">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="badge badge-cat">${t.category||'その他'}</span>
        <span class="badge ${priCls[t.priority]}">${priLbl[t.priority]}</span>
        ${dateLabel}
      </div>
      ${chips?`<div class="task-assignees">${chips}</div>`:''}
      ${tags ?`<div class="task-tags">${tags}</div>`:''}
      <button class="btn-done" onclick="window._toggleDone(event,'${t.id}')" title="${isDone?'未着手に戻す':'完了にする'}">✓</button>
    </div>`;
}

function renderBoard() {
  const filtered = getFiltered();
  const cols = ['未着手','完了'];
  const clsMap = {'未着手':'col-todo','完了':'col-done'};
  let html = '<div class="board" style="grid-template-columns:1fr 1fr;">';
  for (const status of cols) {
    const items = filtered.filter(t => t.status===status);
    html += `<div class="column">
      <div class="column-header ${clsMap[status]}">
        <div class="column-title"><span class="col-dot"></span>${status}</div>
        <span class="column-count">${items.length}</span>
      </div>
      <div class="column-body">
        ${items.length ? items.map(taskCardHtml).join('') : '<div class="empty">なし</div>'}
      </div></div>`;
  }
  document.getElementById('viewContainer').innerHTML = html + '</div>';
}

function renderList() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('viewContainer').innerHTML = '<div class="empty" style="padding:60px">タスクがありません</div>';
    return;
  }
  const priCls={high:'badge-high',med:'badge-med',low:'badge-low'};
  const priLbl={high:'高優先',med:'中優先',low:'低優先'};
  const html = filtered.map(t => {
    const od = isOverdue(t.date) && t.status!=='完了';
    const dl = daysLeft(t.date);
    let ds = '';
    if (t.date) ds = od?`⚠ ${fmtDate(t.date)} 期限切れ`:isToday(t.date)?'今日':dl!==null&&dl<=3?`あと${dl}日`:fmtDate(t.date)+'期限';
    const chips = assigneeChips(t.assignees);
    return `<div class="list-item pri-${t.priority} ${od?'overdue':''}" onclick="window._openTask('${t.id}')">
      <div class="list-content">
        <div class="list-title ${t.status==='完了'?'done-title':''}">${esc(t.title)}${t.googleTaskId?' <span style="font-size:10px;color:#4285f4;">G</span>':''}</div>
        <div class="list-sub">
          <span>${t.category||'その他'}</span><span>${t.status}</span>
          ${ds?`<span>${ds}</span>`:''}
          ${t.createdBy?`<span>作成: ${t.createdBy}</span>`:''}
        </div>
        ${chips?`<div class="task-assignees" style="margin-top:5px">${chips}</div>`:''}
      </div>
      <div class="list-right"><span class="badge ${priCls[t.priority]}">${priLbl[t.priority]}</span></div>
    </div>`;
  }).join('');
  document.getElementById('viewContainer').innerHTML = `<div class="list-view">${html}</div>`;
}

// ===== ASSIGNEE GRID =====
function buildAssigneeGrid() {
  let html = '';
  for (const [role, names] of Object.entries(STAFF)) {
    html += `<div class="assignee-role-group role-${role.toLowerCase()}">
      <div class="assignee-role-label">${role}</div><div class="assignee-grid">`;
    for (const name of names) {
      html += `<input type="checkbox" class="assignee-checkbox" id="asgn_${name}" value="${name}">
               <label for="asgn_${name}" class="assignee-label">${name}</label>`;
    }
    html += '</div></div>';
  }
  document.getElementById('assigneeGrid').innerHTML = html;
}

// ===== MODAL =====
function openModal(id = null) {
  editingId = id;
  if (id && tasks[id]) {
    const t = tasks[id];
    document.getElementById('modalTitle').textContent = 'タスクを編集';
    document.getElementById('fTitle').value = t.title||'';
    document.getElementById('fNote').value  = t.note||'';
    document.getElementById('fCat').value   = t.category||'その他';
    document.getElementById('fDate').value  = t.date||'';
    document.getElementById('fTags').value  = (t.tags||[]).join(', ');
    document.querySelector(`input[name="priority"][value="${t.priority||'med'}"]`).checked = true;
    document.querySelector(`input[name="status"][value="${t.status||'未着手'}"]`).checked = true;
    document.querySelectorAll('.assignee-checkbox').forEach(cb => { cb.checked = (t.assignees||[]).includes(cb.value); });
    document.getElementById('btnDelete').style.display = '';
    // 完了ボタン：完了以外のタスク編集時のみ表示
    const doneBtn = document.getElementById('btnDoneModal');
    if (tasks[id] && tasks[id].status !== '完了') {
      doneBtn.style.display = '';
      doneBtn.textContent = '✓ 完了にする';
    } else if (tasks[id] && tasks[id].status === '完了') {
      doneBtn.style.display = '';
      doneBtn.textContent = '↩ 未着手に戻す';
    }
    // Googleエクスポートボタン（院長＋連携済みでない場合）
    const exportBtn = document.getElementById('btnExportGoogle');
    if (isIncho() && gAccessToken) {
      exportBtn.style.display = 'flex';
      if (t.googleTaskId) {
        exportBtn.textContent = '✅ G連携済み';
        exportBtn.disabled = true;
      } else {
        exportBtn.innerHTML = '<img src="https://www.google.com/favicon.ico" style="width:12px;height:12px;">送る';
        exportBtn.disabled = false;
      }
    } else {
      exportBtn.style.display = 'none';
    }
  } else {
    document.getElementById('modalTitle').textContent = 'タスクを追加';
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value  = '';
    document.getElementById('fCat').value   = 'その他';
    document.getElementById('fDate').value  = '';
    document.getElementById('fTags').value  = '';
    document.querySelector('#pri-med').checked = true;
    document.querySelector('#st-todo').checked  = true;
    document.querySelectorAll('.assignee-checkbox').forEach(cb => cb.checked = false);
    if (currentUser) {
      const myBox = document.getElementById(`asgn_${currentUser.name}`);
      if (myBox) myBox.checked = true;
    }
    document.getElementById('btnDelete').style.display = 'none';
    document.getElementById('btnExportGoogle').style.display = 'none';
    document.getElementById('btnDoneModal').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 300);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function handleOverlayClick(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

async function saveTask() {
  if (saving) return;
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }
  const assignees = [...document.querySelectorAll('.assignee-checkbox:checked')].map(cb => cb.value);
  const newStatus = document.querySelector('input[name="status"]:checked').value;
  const data = {
    title,
    note:      document.getElementById('fNote').value.trim(),
    category:  document.getElementById('fCat').value,
    date:      document.getElementById('fDate').value,
    priority:  document.querySelector('input[name="priority"]:checked').value,
    status:    newStatus,
    assignees,
    tags:      document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    updatedAt: Date.now(),
    updatedBy: currentUser?.name||'不明',
  };
  saving = true;
  document.getElementById('btnSave').disabled = true;
  try {
    if (editingId) {
      const existing = tasks[editingId] || {};
      await set(ref(db, `tasks/${editingId}`), { ...existing, ...data });
      // Googleタスクが紐づいていて完了になった場合
      if (newStatus === '完了' && existing.googleTaskId) {
        await completeGoogleTask(existing.googleTaskId, existing.googleListId);
      }
      showToast('更新しました');
    } else {
      data.createdAt = Date.now();
      data.createdBy = currentUser?.name||'不明';
      await push(ref(db, 'tasks'), data);
      showToast('追加しました');
    }
    closeModal();
  } catch(e) { showToast('保存に失敗しました'); }
  finally { saving = false; document.getElementById('btnSave').disabled = false; }
}

async function deleteTask() {
  if (!editingId || !confirm('このタスクを削除しますか？')) return;
  try { await remove(ref(db, `tasks/${editingId}`)); closeModal(); showToast('削除しました'); }
  catch(e) { showToast('削除に失敗しました'); }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-board').classList.toggle('active', v==='board');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.setFilter = setFilter; window.setView = setView;
window.openModal = openModal; window.closeModal = closeModal;
window.handleOverlayClick = handleOverlayClick;
window.saveTask = saveTask; window.deleteTask = deleteTask;
window._openTask = (id) => openModal(id);

// 編集モーダルの完了ボタン
window.quickComplete = async function() {
  if (!editingId || !tasks[editingId]) return;
  const current = tasks[editingId].status;
  const newStatus = current === '完了' ? '未着手' : '完了';
  try {
    await set(ref(db, `tasks/${editingId}/status`), newStatus);
    await set(ref(db, `tasks/${editingId}/updatedAt`), Date.now());
    await set(ref(db, `tasks/${editingId}/updatedBy`), currentUser?.name || '不明');
    if (newStatus === '完了' && tasks[editingId].googleTaskId) {
      await completeGoogleTask(tasks[editingId].googleTaskId, tasks[editingId].googleListId);
    }
    showToast(newStatus === '完了' ? '✅ 完了にしました' : '↩ 未着手に戻しました');
    closeModal();
  } catch(e) {
    showToast('更新に失敗しました');
  }
};

// カードの完了ボタン
window._toggleDone = async function(e, id) {
  e.stopPropagation(); // カードのクリックイベントを止める
  if (!tasks[id]) return;
  const current = tasks[id].status;
  const newStatus = current === '完了' ? '未着手' : '完了';
  try {
    await set(ref(db, `tasks/${id}/status`), newStatus);
    await set(ref(db, `tasks/${id}/updatedAt`), Date.now());
    await set(ref(db, `tasks/${id}/updatedBy`), currentUser?.name||'不明');
    // Googleタスクと連携していれば完了を反映
    if (newStatus === '完了' && tasks[id].googleTaskId) {
      await completeGoogleTask(tasks[id].googleTaskId, tasks[id].googleListId);
    }
    showToast(newStatus === '完了' ? '✅ 完了にしました' : '↩ 未着手に戻しました');
  } catch(err) {
    showToast('更新に失敗しました');
  }
};

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key==='Enter' && document.getElementById('overlay').classList.contains('open')) saveTask();
});

init();
</script>
