<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク管理 | カルミアデンタル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #faf9f6;
    --border: #e8e4dc;
    --text: #2c2a26;
    --text-muted: #9a9590;
    --accent: #5b8a72;
    --accent-light: #e8f2ed;
    --high: #c9524a;
    --high-light: #fdeeed;
    --med: #d4883a;
    --med-light: #fef3e7;
    --low: #6a8ab0;
    --low-light: #eef2f8;
    --tag-bg: #ede9e1;
    --shadow: 0 2px 12px rgba(44,42,38,0.08);
    --radius: 14px;
    --radius-sm: 8px;
    --mint: #4ecdc4;
    --sky: #74b9ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    gap: 10px;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--accent);
    white-space: nowrap;
  }

  .header-title span {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: var(--text-muted);
    display: block;
    letter-spacing: 0.06em;
  }

  .header-center {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  .user-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 100px;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 14px;
    height: 34px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { background: #4a7862; }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ===== MAIN ===== */
  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ===== STATS ===== */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
  }

  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ===== BOARD ===== */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  @media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .board { grid-template-columns: 1fr; } }

  .column {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .column-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .column-title {
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .col-dot { width: 7px; height: 7px; border-radius: 50%; }
  .col-todo .col-dot { background: var(--text-muted); }
  .col-doing .col-dot { background: var(--med); }
  .col-done .col-dot { background: var(--accent); }
  .col-hold .col-dot { background: var(--low); }

  .column-count {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 100px;
  }

  .column-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-height: 80px;
  }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .task-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .task-card.pri-high::before { background: var(--high); }
  .task-card.pri-med::before { background: var(--med); }
  .task-card.pri-low::before { background: var(--low); }
  .task-card.overdue { border-color: #f5c6c4; }

  .task-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 7px;
  }

  .task-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 100px;
    font-weight: 500;
  }

  .badge-cat { background: var(--tag-bg); color: var(--text-muted); }
  .badge-high { background: var(--high-light); color: var(--high); }
  .badge-med { background: var(--med-light); color: var(--med); }
  .badge-low { background: var(--low-light); color: var(--low); }
  .badge-date { background: var(--accent-light); color: var(--accent); margin-left: auto; }
  .badge-date.overdue-date { background: var(--high-light); color: var(--high); }
  .badge-date.today-date { background: var(--med-light); color: var(--med); }

  .task-assignees {
    margin-top: 7px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }

  .assignee-chip {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 600;
  }

  .chip-dr { background: #e8f9f8; color: #2b7a75; }
  .chip-dh { background: #f3f0ff; color: #5f49c7; }
  .chip-da { background: #fff3e8; color: #b35c00; }
  .chip-other { background: var(--tag-bg); color: var(--text-muted); }

  .task-tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }
  .tag { font-size: 10px; background: var(--tag-bg); color: var(--text-muted); padding: 1px 5px; border-radius: 4px; }

  /* ===== LIST VIEW ===== */
  .list-view { display: flex; flex-direction: column; gap: 5px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    padding-left: 18px;
    overflow: hidden;
  }

  .list-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .list-item.pri-high::before { background: var(--high); }
  .list-item.pri-med::before { background: var(--med); }
  .list-item.pri-low::before { background: var(--low); }
  .list-item:hover { box-shadow: var(--shadow); }
  .list-item.overdue { border-color: #f5c6c4; }

  .list-content { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 500; }
  .list-title.done-title { text-decoration: line-through; color: var(--text-muted); }
  .list-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .list-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  /* ===== MODAL ===== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,42,38,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  @media (min-width: 600px) {
    .overlay { align-items: center; }
    .modal { border-radius: var(--radius) !important; max-width: 540px; }
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 22px 18px;
    transform: translateY(40px);
    transition: transform 0.25s;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .modal-title { font-size: 15px; font-weight: 700; }

  .btn-close {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
  }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }

  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 11px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Priority radio */
  .radio-group { display: flex; gap: 7px; flex-wrap: wrap; }
  .radio-option { display: none; }
  .radio-label {
    padding: 6px 13px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  #pri-high:checked + .radio-label { background: var(--high-light); border-color: var(--high); color: var(--high); font-weight: 700; }
  #pri-med:checked + .radio-label { background: var(--med-light); border-color: var(--med); color: var(--med); font-weight: 700; }
  #pri-low:checked + .radio-label { background: var(--low-light); border-color: var(--low); color: var(--low); font-weight: 700; }

  /* Status radio */
  .status-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-option { display: none; }
  .status-label {
    padding: 6px 13px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .status-option:checked + .status-label {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }

  /* Assignee checkboxes */
  .assignee-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .assignee-checkbox { display: none; }

  .assignee-label {
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .assignee-checkbox:checked + .assignee-label {
    font-weight: 700;
  }

  .role-dr .assignee-checkbox:checked + .assignee-label { background: #e8f9f8; border-color: #2b7a75; color: #2b7a75; }
  .role-dh .assignee-checkbox:checked + .assignee-label { background: #f3f0ff; border-color: #5f49c7; color: #5f49c7; }
  .role-da .assignee-checkbox:checked + .assignee-label { background: #fff3e8; border-color: #b35c00; color: #b35c00; }

  .assignee-role-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .assignee-role-group { margin-bottom: 8px; }

  .modal-footer {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--high);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-delete:hover { background: var(--high-light); border-color: var(--high); }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
  }

  .btn-save:hover { background: #4a7862; }
  .btn-save:disabled { background: var(--text-muted); cursor: not-allowed; }

  .empty { text-align: center; padding: 28px 12px; color: var(--text-muted); font-size: 12px; }

  /* ===== LOADING ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-muted);
    font-size: 13px;
    gap: 10px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 300;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media print {
    header, .filter-bar, .stats-bar, .btn-add, .btn-icon, .overlay { display: none !important; }
    .board { grid-template-columns: repeat(4,1fr); }
    .task-card { break-inside: avoid; }
    body { background: white; }
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ===== NO LOGIN - ポータルセッション引き継ぎ ===== -->

<!-- ===== HEADER ===== -->
<header>
  <div class="header-title">
    Tasks
    <span>カルミアデンタル</span>
  </div>
  <div class="header-center">
    <div class="user-badge" id="userBadge"></div>
  </div>
  <div class="header-actions">
    <!-- Google連携ボタン（院長のみ表示） -->
    <button class="btn-icon" id="btnGoogleSync" title="Googleタスクと同期" onclick="syncGoogleTasks()" style="display:none;position:relative;">
      <img src="https://www.google.com/favicon.ico" style="width:14px;height:14px;">
      <span id="syncDot" style="position:absolute;top:4px;right:4px;width:6px;height:6px;background:#34a853;border-radius:50%;display:none;"></span>
    </button>
    <button class="btn-icon" id="btn-list" title="リスト" onclick="setView('list')">☰</button>
    <button class="btn-icon active" id="btn-board" title="ボード" onclick="setView('board')">⊞</button>
    <button class="btn-icon" title="印刷" onclick="window.print()">🖨</button>
    <button class="btn-add" onclick="openModal()">＋ 追加</button>
  </div>
</header>

<!-- ===== FILTER BAR ===== -->
<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-chip" onclick="setFilter('mine',this)">自分のタスク</button>
  <button class="filter-chip" onclick="setFilter('未着手',this)">未着手</button>
  <button class="filter-chip" onclick="setFilter('進行中',this)">進行中</button>
  <button class="filter-chip" onclick="setFilter('完了',this)">完了</button>
  <button class="filter-chip" onclick="setFilter('保留',this)">保留</button>
  <button class="filter-chip" onclick="setFilter('overdue',this)">⚠ 期限切れ</button>
  <button class="filter-chip" onclick="setFilter('high',this)">🔴 高優先</button>
  <button class="filter-chip" onclick="setFilter('診療',this)">診療</button>
  <button class="filter-chip" onclick="setFilter('経営',this)">経営</button>
  <button class="filter-chip" onclick="setFilter('スタッフ',this)">スタッフ</button>
  <button class="filter-chip" onclick="setFilter('設備',this)">設備</button>
</div>

<main>
  <div class="stats-bar" id="statsBar"></div>
  <!-- Google同期バナー（院長用） -->
  <div id="googleBanner" style="display:none;background:white;border:1px solid #e8e4dc;border-radius:14px;padding:14px 16px;margin-bottom:14px;display:none;align-items:center;gap:12px;">
    <img src="https://www.google.com/favicon.ico" style="width:18px;height:18px;flex-shrink:0;">
    <div style="flex:1;font-size:13px;" id="googleBannerText">Googleタスクと連携できます</div>
    <button onclick="startGoogleAuth()" id="googleSignInBtn" style="background:#4285f4;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">Googleでサインイン</button>
  </div>
  <div id="viewContainer"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
</main>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">タスクを追加</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label>タイトル *</label>
      <input type="text" id="fTitle" placeholder="タスクのタイトル">
    </div>

    <div class="form-group">
      <label>メモ</label>
      <textarea id="fNote" placeholder="詳細・備考など"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="fCat">
          <option value="診療">診療</option>
          <option value="経営">経営</option>
          <option value="スタッフ">スタッフ</option>
          <option value="設備">設備</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>期限</label>
        <input type="date" id="fDate">
      </div>
    </div>

    <div class="form-group">
      <label>優先度</label>
      <div class="radio-group">
        <input type="radio" class="radio-option" name="priority" id="pri-high" value="high">
        <label for="pri-high" class="radio-label">🔴 高</label>
        <input type="radio" class="radio-option" name="priority" id="pri-med" value="med" checked>
        <label for="pri-med" class="radio-label">🟡 中</label>
        <input type="radio" class="radio-option" name="priority" id="pri-low" value="low">
        <label for="pri-low" class="radio-label">🔵 低</label>
      </div>
    </div>

    <div class="form-group">
      <label>ステータス</label>
      <div class="status-group">
        <input type="radio" class="status-option" name="status" id="st-todo" value="未着手" checked>
        <label for="st-todo" class="status-label">未着手</label>
        <input type="radio" class="status-option" name="status" id="st-doing" value="進行中">
        <label for="st-doing" class="status-label">進行中</label>
        <input type="radio" class="status-option" name="status" id="st-done" value="完了">

      <button class="btn-save" id="btnSave" onclick="saveTask()">保存</button>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, set, remove, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey:            'AIzaSyDdMe7feUF6CKPHH0YIx7Suk-WnXtOYUu8',
  authDomain:        'kalmia-shift.firebaseapp.com',
  databaseURL:       'https://kalmia-shift-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:         'kalmia-shift',
  storageBucket:     'kalmia-shift.firebasestorage.app',
  messagingSenderId: '714175473480',
  appId:             '1:714175473480:web:7d6626a46e4a9dcb1fb57d'
};
const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

// ===== GOOGLE TASKS =====
const GCLIENT_ID = '218253038073-v3nrmbet629g11ljjd1t0rqbn6t4evpr.apps.googleusercontent.com';
const GSCOPE     = 'https://www.googleapis.com/auth/tasks';
let gAccessToken = null;
let tokenClient  = null;
let gsiReady     = false;

// ===== STAFF =====
const STAFF = {
  DR: ['院長','嶋中','保刈','篠田'],
  DH: ['鶴田','吉田','高木','松本','野崎','山田','ハノワ'],
  DA: ['田宮','田中','百々']
};
const ROLE_OF = {};
Object.entries(STAFF).forEach(([role, names]) => names.forEach(n => ROLE_OF[n] = role));

// ===== ユーザー特定 =====
function resolveUser() {
  try {
    const saved = sessionStorage.getItem('portalUser');
    if (saved) { const u = JSON.parse(saved); if (u.name) return u; }
  } catch(e) {}
  const p = new URLSearchParams(location.search);
  const name = p.get('name'), sid = p.get('sid');
  if (name && sid) {
    const rm = { sugihira:'DR',shimanaka:'DR',hokari:'DR',shinoda:'DR',
                 tsuruta:'DH',yoshida:'DH',takagi:'DH',matsumoto:'DH',nozaki:'DH',yamada:'DH',hanowa:'DH',
                 tamiya:'DA',tanaka:'DA',momo:'DA' };
    return { name, staffId: sid, role: rm[sid]||'DH' };
  }
  const cached = sessionStorage.getItem('taskUserName');
  if (cached) {
    const rm2 = {};
    Object.entries(STAFF).forEach(([r,names]) => names.forEach(n => rm2[n]=r));
    return { name: cached, role: rm2[cached]||'DH', staffId:'' };
  }
  return null;
}

// ===== STATE =====
let currentUser = resolveUser();
let tasks = {};
let currentFilter = 'all';
let currentView   = 'board';
let editingId     = null;
let saving        = false;

const isIncho = () => currentUser?.staffId === 'sugihira' || currentUser?.name === '院長';

// ===== 名前選択バナー =====
function showNameBanner() {
  const ban = document.createElement('div');
  ban.id = 'nameBanner';
  ban.style.cssText = 'position:fixed;inset:0;background:rgba(44,42,38,0.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;';
  const opts = Object.entries(STAFF).map(([role, names]) =>
    `<optgroup label="${role}">${names.map(n=>`<option>${n}</option>`).join('')}</optgroup>`
  ).join('');
  ban.innerHTML = `
    <div style="background:white;border-radius:16px;padding:24px 20px;width:100%;max-width:300px;text-align:center;">
      <div style="font-size:36px;margin-bottom:10px;">👤</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:6px;">あなたは？</div>
      <div style="font-size:12px;color:#9a9590;margin-bottom:16px;">タスクの作成・担当表示に使用します</div>
      <select id="nameSelect" style="width:100%;border:1px solid #e8e4dc;border-radius:8px;padding:10px;font-size:14px;margin-bottom:12px;-webkit-appearance:none;background:white;outline:none;">
        <option value="">── 選択してください ──</option>${opts}
      </select>
      <button onclick="window._setName()" style="width:100%;padding:11px;background:#5b8a72;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">OK</button>
    </div>`;
  document.body.appendChild(ban);
}

window._setName = function() {
  const sel = document.getElementById('nameSelect').value;
  if (!sel) return;
  const rm = {};
  Object.entries(STAFF).forEach(([r,names]) => names.forEach(n => rm[n]=r));
  // staffIdマッピング
  const sidMap = { '院長':'sugihira','嶋中':'shimanaka','保刈':'hokari','篠田':'shinoda',
    '鶴田':'tsuruta','吉田':'yoshida','高木':'takagi','松本':'matsumoto','野崎':'nozaki','山田':'yamada','ハノワ':'hanowa',
    '田宮':'tamiya','田中':'tanaka','百々':'momo' };
  currentUser = { name: sel, role: rm[sel]||'DH', staffId: sidMap[sel]||'' };
  sessionStorage.setItem('taskUserName', sel);
  document.getElementById('nameBanner').remove();
  document.getElementById('userBadge').textContent = sel;
  setupGoogleForIncho();
};

// ===== GOOGLE AUTH SETUP =====
function setupGoogleForIncho() {
  if (!isIncho()) return;

  // Google同期ボタンとバナーを表示
  document.getElementById('btnGoogleSync').style.display = 'flex';
  const banner = document.getElementById('googleBanner');
  banner.style.display = 'flex';

  // GSIライブラリの読み込み待ち
  waitForGsi().then(() => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GCLIENT_ID,
      scope: GSCOPE,
      callback: async (resp) => {
        if (resp.error) { showToast('Googleサインインに失敗しました'); return; }
        gAccessToken = resp.access_token;
        document.getElementById('syncDot').style.display = 'block';
        document.getElementById('googleBannerText').textContent = 'Googleタスクと連携中';
        document.getElementById('googleSignInBtn').textContent = '今すぐ同期';
        document.getElementById('googleSignInBtn').style.background = '#34a853';
        document.getElementById('googleSignInBtn').onclick = () => syncGoogleTasks();
        // 認証成功後すぐ同期
        await syncGoogleTasks();
      },
    });

    // トークンがセッションに残っていれば即同期試行（prompt不要）
    const savedToken = sessionStorage.getItem('gAccessToken');
    if (savedToken) {
      gAccessToken = savedToken;
      document.getElementById('syncDot').style.display = 'block';
      document.getElementById('googleBannerText').textContent = 'Googleタスクと連携中';
      document.getElementById('googleSignInBtn').textContent = '今すぐ同期';
      document.getElementById('googleSignInBtn').style.background = '#34a853';
      document.getElementById('googleSignInBtn').onclick = () => syncGoogleTasks();
      syncGoogleTasks();
    }
  });
}

function waitForGsi() {
  return new Promise(resolve => {
    if (typeof google !== 'undefined' && google.accounts) { resolve(); return; }
    const interval = setInterval(() => {
      if (typeof google !== 'undefined' && google.accounts) { clearInterval(interval); resolve(); }
    }, 200);
  });
}

window.startGoogleAuth = function() {
  if (!tokenClient) { showToast('少しお待ちください...'); return; }
  if (gAccessToken) { syncGoogleTasks(); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
};

// ===== GOOGLE TASKS 同期 =====
window.syncGoogleTasks = async function() {
  if (!gAccessToken) { startGoogleAuth(); return; }

  const banner = document.getElementById('googleBannerText');
  banner.textContent = '同期中...';

  try {
    // タスクリスト一覧を取得
    const listRes = await gFetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists?maxResults=20');
    if (!listRes.ok) {
      // トークン切れの可能性
      if (listRes.status === 401) {
        gAccessToken = null;
        sessionStorage.removeItem('gAccessToken');
        document.getElementById('syncDot').style.display = 'none';
        banner.textContent = 'セッション切れ。再サインインしてください';
        document.getElementById('googleSignInBtn').textContent = 'Googleでサインイン';
        document.getElementById('googleSignInBtn').style.background = '#4285f4';
        document.getElementById('googleSignInBtn').onclick = () => startGoogleAuth();
        return;
      }
      throw new Error(`HTTP ${listRes.status}`);
    }
    const listData = await listRes.json();
    const lists = listData.items || [];

    // 全リストのタスクを取得
    let allGTasks = [];
    for (const list of lists) {
      const taskRes = await gFetch(
        `https://tasks.googleapis.com/tasks/v1/lists/${list.id}/tasks?showCompleted=false&showHidden=false&maxResults=100`
      );
      if (!taskRes.ok) continue;
      const taskData = await taskRes.json();
      const items = (taskData.items || []).map(t => ({ ...t, _listId: list.id, _listTitle: list.title }));
      allGTasks = allGTasks.concat(items);
    }

    // FirebaseにないGoogleタスクをインポート
    const existingGIds = new Set(
      Object.values(tasks).map(t => t.googleTaskId).filter(Boolean)
    );

    let imported = 0;
    for (const gt of allGTasks) {
      if (existingGIds.has(gt.id)) {
        // 既存タスクの完了状態を同期
        const fbTask = Object.entries(tasks).find(([,t]) => t.googleTaskId === gt.id);
        if (fbTask && gt.status === 'completed' && fbTask[1].status !== '完了') {
          await set(ref(db, `tasks/${fbTask[0]}/status`), '完了');
        }
        continue;
      }
      // 新規インポート
      const due = gt.due ? gt.due.split('T')[0] : '';
      const newTask = {
        title:        gt.title || '（タイトルなし）',
        note:         gt.notes || '',
        category:     'その他',
        date:         due,
        priority:     'med',
        status:       gt.status === 'completed' ? '完了' : '未着手',
        assignees:    ['院長'],
        tags:         [`Gタスク`, gt._listTitle].filter(Boolean),
        googleTaskId: gt.id,
        googleListId: gt._listId,
        createdAt:    Date.now(),
        createdBy:    '院長（Google）',
        updatedAt:    Date.now(),
        updatedBy:    '院長（Google）',
      };
      await push(ref(db, 'tasks'), newTask);
      imported++;
    }

    // トークンをセッションに保存
    sessionStorage.setItem('gAccessToken', gAccessToken);

    const msg = imported > 0 ? `${imported}件のGoogleタスクを取り込みました` : 'Googleタスクと同期済み';
    banner.textContent = `✅ ${msg}`;
    showToast(msg);
    setTimeout(() => { banner.textContent = 'Googleタスクと連携中'; }, 3000);

  } catch(e) {
    console.error(e);
    banner.textContent = '同期に失敗しました';
    showToast('同期に失敗しました: ' + e.message);
  }
};

// Firebase上でタスクを完了にした時、Googleタスクも完了にする
async function completeGoogleTask(googleTaskId, googleListId) {
  if (!gAccessToken || !googleTaskId || !googleListId) return;
  try {
    await gFetch(
      `https://tasks.googleapis.com/tasks/v1/lists/${googleListId}/tasks/${googleTaskId}`,
      {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'completed' })
      }
    );
  } catch(e) { console.warn('Google完了更新失敗:', e); }
}

function gFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${gAccessToken}`,
      ...(opts.headers || {})
    }
  });
}

// ===== INIT =====
function init() {
  if (currentUser) {
    document.getElementById('userBadge').textContent = currentUser.name;
    setupGoogleForIncho();
  } else {
    showNameBanner();
  }
  buildAssigneeGrid();
  onValue(ref(db, 'tasks'), snap => {
    tasks = snap.val() || {};
    render();
  });
}

// ===== DATE HELPERS =====
function todayStr() { return new Date().toISOString().split('T')[0]; }
function isOverdue(d) { return d && d < todayStr(); }
function isToday(d)   { return d === todayStr(); }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function daysLeft(d) {
  if (!d) return null;
  return Math.round((new Date(d+'T00:00:00') - new Date(todayStr()+'T00:00:00')) / 86400000);
}

// ===== FILTER =====
function getFiltered() {
  return Object.entries(tasks).filter(([id, t]) => {
    if (currentFilter === 'all')     return true;
    if (currentFilter === 'mine')    return currentUser && (t.assignees||[]).includes(currentUser.name);
    if (currentFilter === 'overdue') return isOverdue(t.date) && t.status !== '完了';
    if (currentFilter === 'high')    return t.priority === 'high';
    if (['未着手','進行中','完了','保留'].includes(currentFilter)) return t.status === currentFilter;
    if (['診療','経営','スタッフ','設備','その他'].includes(currentFilter)) return t.category === currentFilter;
    return true;
  }).map(([id, t]) => ({ id, ...t }));
}

// ===== RENDER =====
function render() { renderStats(); currentView==='board' ? renderBoard() : renderList(); }

function renderStats() {
  const all  = Object.values(tasks);
  const mine = currentUser ? all.filter(t => (t.assignees||[]).includes(currentUser.name)) : [];
  const doing   = all.filter(t => t.status==='進行中').length;
  const overdue = all.filter(t => isOverdue(t.date) && t.status!=='完了').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">全タスク</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--low)">${mine.length}</div><div class="stat-label">自分担当</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--med)">${doing}</div><div class="stat-label">進行中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--high)">${overdue}</div><div class="stat-label">期限切れ</div></div>`;
}

function assigneeChips(assignees) {
  if (!assignees||!assignees.length) return '';
  return assignees.map(name => {
    const r = ROLE_OF[name]||'';
    const cls = r==='DR'?'chip-dr':r==='DH'?'chip-dh':r==='DA'?'chip-da':'chip-other';
    return `<span class="assignee-chip ${cls}">${name}</span>`;
  }).join('');
}

function taskCardHtml(t) {
  const od = isOverdue(t.date) && t.status!=='完了';
  const dl = daysLeft(t.date);
  let dateLabel = '';
  if (t.date) {
    let cls='badge-date', txt=fmtDate(t.date);
    if (od)                          { cls+=' overdue-date'; txt=`⚠ ${txt}`; }
    else if (isToday(t.date))        { cls+=' today-date'; txt='今日'; }
    else if (dl!==null && dl<=3)     { txt=`あと${dl}日`; }
    dateLabel = `<span class="badge ${cls}">${txt}</span>`;
  }
  const priCls={high:'badge-high',med:'badge-med',low:'badge-low'};
  const priLbl={high:'高',med:'中',low:'低'};
  const tags  = (t.tags||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join('');
  const chips = assigneeChips(t.assignees);
  const gIcon = t.googleTaskId ? `<span title="Googleタスク" style="font-size:10px;margin-left:auto;">G</span>` : '';
  return `
    <div class="task-card pri-${t.priority} ${od?'overdue':''}" onclick="window._openTask('${t.id}')">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="badge badge-cat">${t.category||'その他'}</span>
        <span class="badge ${priCls[t.priority]}">${priLbl[t.priority]}</span>
        ${dateLabel}${gIcon}
      </div>
      ${chips?`<div class="task-assignees">${chips}</div>`:''}
      ${tags ?`<div class="task-tags">${tags}</div>`:''}
    </div>`;
}

function renderBoard() {
  const filtered = getFiltered();
  const cols = ['未着手','進行中','完了','保留'];
  const clsMap = {'未着手':'col-todo','進行中':'col-doing','完了':'col-done','保留':'col-hold'};
  let html = '<div class="board">';
  for (const status of cols) {
    const items = filtered.filter(t => t.status===status);
    html += `<div class="column">
      <div class="column-header ${clsMap[status]}">
        <div class="column-title"><span class="col-dot"></span>${status}</div>
        <span class="column-count">${items.length}</span>
      </div>
      <div class="column-body">
        ${items.length ? items.map(taskCardHtml).join('') : '<div class="empty">なし</div>'}
      </div></div>`;
  }
  document.getElementById('viewContainer').innerHTML = html + '</div>';
}

function renderList() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('viewContainer').innerHTML = '<div class="empty" style="padding:60px">タスクがありません</div>';
    return;
  }
  const priCls={high:'badge-high',med:'badge-med',low:'badge-low'};
  const priLbl={high:'高優先',med:'中優先',low:'低優先'};
  const html = filtered.map(t => {
    const od = isOverdue(t.date) && t.status!=='完了';
    const dl = daysLeft(t.date);
    let ds = '';
    if (t.date) ds = od?`⚠ ${fmtDate(t.date)} 期限切れ`:isToday(t.date)?'今日':dl!==null&&dl<=3?`あと${dl}日`:fmtDate(t.date)+'期限';
    const chips = assigneeChips(t.assignees);
    return `<div class="list-item pri-${t.priority} ${od?'overdue':''}" onclick="window._openTask('${t.id}')">
      <div class="list-content">
        <div class="list-title ${t.status==='完了'?'done-title':''}">${esc(t.title)}${t.googleTaskId?' <span style="font-size:10px;color:#4285f4;">G</span>':''}</div>
        <div class="list-sub">
          <span>${t.category||'その他'}</span><span>${t.status}</span>
          ${ds?`<span>${ds}</span>`:''}
          ${t.createdBy?`<span>作成: ${t.createdBy}</span>`:''}
        </div>
        ${chips?`<div class="task-assignees" style="margin-top:5px">${chips}</div>`:''}
      </div>
      <div class="list-right"><span class="badge ${priCls[t.priority]}">${priLbl[t.priority]}</span></div>
    </div>`;
  }).join('');
  document.getElementById('viewContainer').innerHTML = `<div class="list-view">${html}</div>`;
}

// ===== ASSIGNEE GRID =====
function buildAssigneeGrid() {
  let html = '';
  for (const [role, names] of Object.entries(STAFF)) {
    html += `<div class="assignee-role-group role-${role.toLowerCase()}">
      <div class="assignee-role-label">${role}</div><div class="assignee-grid">`;
    for (const name of names) {
      html += `<input type="checkbox" class="assignee-checkbox" id="asgn_${name}" value="${name}">
               <label for="asgn_${name}" class="assignee-label">${name}</label>`;
    }
    html += '</div></div>';
  }
  document.getElementById('assigneeGrid').innerHTML = html;
}

// ===== MODAL =====
function openModal(id = null) {
  editingId = id;
  if (id && tasks[id]) {
    const t = tasks[id];
    document.getElementById('modalTitle').textContent = 'タスクを編集';
    document.getElementById('fTitle').value = t.title||'';
    document.getElementById('fNote').value  = t.note||'';
    document.getElementById('fCat').value   = t.category||'その他';
    document.getElementById('fDate').value  = t.date||'';
    document.getElementById('fTags').value  = (t.tags||[]).join(', ');
    document.querySelector(`input[name="priority"][value="${t.priority||'med'}"]`).checked = true;
    document.querySelector(`input[name="status"][value="${t.status||'未着手'}"]`).checked = true;
    document.querySelectorAll('.assignee-checkbox').forEach(cb => { cb.checked = (t.assignees||[]).includes(cb.value); });
    document.getElementById('btnDelete').style.display = '';
  } else {
    document.getElementById('modalTitle').textContent = 'タスクを追加';
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value  = '';
    document.getElementById('fCat').value   = 'その他';
    document.getElementById('fDate').value  = '';
    document.getElementById('fTags').value  = '';
    document.querySelector('#pri-med').checked = true;
    document.querySelector('#st-todo').checked  = true;
    document.querySelectorAll('.assignee-checkbox').forEach(cb => cb.checked = false);
    if (currentUser) {
      const myBox = document.getElementById(`asgn_${currentUser.name}`);
      if (myBox) myBox.checked = true;
    }
    document.getElementById('btnDelete').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 300);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function handleOverlayClick(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

async function saveTask() {
  if (saving) return;
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }
  const assignees = [...document.querySelectorAll('.assignee-checkbox:checked')].map(cb => cb.value);
  const newStatus = document.querySelector('input[name="status"]:checked').value;
  const data = {
    title,
    note:      document.getElementById('fNote').value.trim(),
    category:  document.getElementById('fCat').value,
    date:      document.getElementById('fDate').value,
    priority:  document.querySelector('input[name="priority"]:checked').value,
    status:    newStatus,
    assignees,
    tags:      document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    updatedAt: Date.now(),
    updatedBy: currentUser?.name||'不明',
  };
  saving = true;
  document.getElementById('btnSave').disabled = true;
  try {
    if (editingId) {
      const existing = tasks[editingId] || {};
      await set(ref(db, `tasks/${editingId}`), { ...existing, ...data });
      // Googleタスクが紐づいていて完了になった場合
      if (newStatus === '完了' && existing.googleTaskId) {
        await completeGoogleTask(existing.googleTaskId, existing.googleListId);
      }
      showToast('更新しました');
    } else {
      data.createdAt = Date.now();
      data.createdBy = currentUser?.name||'不明';
      await push(ref(db, 'tasks'), data);
      showToast('追加しました');
    }
    closeModal();
  } catch(e) { showToast('保存に失敗しました'); }
  finally { saving = false; document.getElementById('btnSave').disabled = false; }
}

async function deleteTask() {
  if (!editingId || !confirm('このタスクを削除しますか？')) return;
  try { await remove(ref(db, `tasks/${editingId}`)); closeModal(); showToast('削除しました'); }
  catch(e) { showToast('削除に失敗しました'); }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-board').classList.toggle('active', v==='board');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.setFilter = setFilter; window.setView = setView;
window.openModal = openModal; window.closeModal = closeModal;
window.handleOverlayClick = handleOverlayClick;
window.saveTask = saveTask; window.deleteTask = deleteTask;
window._openTask = (id) => openModal(id);

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key==='Enter' && document.getElementById('overlay').classList.contains('open')) saveTask();
});

init();
</script>
</body>
</html>
